<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythQuill 1.0 — Arquiteto de Dashboard Narrativo</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.1.1/font/lucide.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#000000',
                            white: '#FFFFFF',
                            gray: '#F5F5F5',
                            border: '#E5E5E5',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FFFFFF;
            color: #000000;
        }

        .border-black-fine {
            border: 1px solid #000000;
        }

        .border-soft {
            border: 1px solid #E5E5E5;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-custom::-webkit-scrollbar {
            width: 4px;
        }

        .scrollbar-custom::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #000000;
            border-radius: 0px;
        }

        .card-minimal {
            border: 1px solid #E5E5E5;
            transition: all 0.2s ease;
            background: white;
        }

        .card-minimal:hover {
            border-color: #000000;
        }

        ::selection {
            background: #000000;
            color: #FFFFFF;
        }
    </style>
</head>

<body class="overflow-hidden font-sans text-black">
    <div id="root" class="h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CORE LOGIC & STORAGE ---
        // Using a distinct storage key to avoid collision but keeping it compatible with user's previous data if needed
        const SP = 'mythquill-1.0-';
        const load = (k, d) => { try { const r = localStorage.getItem(SP + k); return r ? JSON.parse(r) : d; } catch { return d; } };
        const save = (k, v) => { try { localStorage.setItem(SP + k, JSON.stringify(v)); } catch { } window.dispatchEvent(new CustomEvent('mq-update', { detail: { k } })); };

        // --- UI COMPONENTS ---
        const Icon = ({ name, className = "" }) => <i className={`lucide-${name} ${className}`}></i>;

        const Btn = ({ children, onClick, variant = "primary", className = "", icon }) => {
            const themes = {
                primary: "bg-black text-white hover:bg-zinc-800 shadow-sm",
                secondary: "border border-black text-black hover:bg-black hover:text-white",
                ghost: "text-zinc-500 hover:text-black hover:bg-zinc-100",
                danger: "text-red-600 hover:bg-red-50"
            };
            return (
                <button onClick={onClick} className={`flex items-center justify-center gap-2 px-4 py-2 text-[11px] font-bold uppercase tracking-widest transition-all rounded-none ${themes[variant]} ${className}`}>
                    {icon && <Icon name={icon} />}
                    {children}
                </button>
            );
        };

        const Input = ({ label, value, onChange, placeholder, type = "text" }) => (
            <div className="mb-6">
                {label && <label class="text-[9px] uppercase tracking-[3px] text-zinc-400 font-bold mb-2 block">{label}</label>}
                <input
                    type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
                    className="w-full border-b border-zinc-200 focus:border-black py-2 outline-none text-sm transition-all bg-transparent"
                />
            </div>
        );

        const Area = ({ label, value, onChange, placeholder, rows = 4 }) => (
            <div className="mb-6">
                {label && <label class="text-[9px] uppercase tracking-[3px] text-zinc-400 font-bold mb-2 block">{label}</label>}
                <textarea
                    value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
                    className="w-full border border-zinc-200 focus:border-black p-3 outline-none text-sm leading-relaxed transition-all rounded-none resize-none px-4"
                />
            </div>
        );

        // --- NAVIGATION ---
        const Sidebar = ({ activeTab, setTab }) => {
            const menu = [
                { id: 'est', label: 'Estrutura', icon: 'layout', group: 'Criação' },
                { id: 'per', label: 'Personagens', icon: 'users', group: 'Universo' },
                { id: 'loc', label: 'Locais', icon: 'map-pin', group: 'Universo' },
                { id: 'tmp', label: 'Linha do Tempo', icon: 'clock', group: 'Universo' },
                { id: 'rel', label: 'Relacionamentos', icon: 'git-merge', group: 'Universo' },
                { id: 'sis', label: 'Sistemas', icon: 'settings', group: 'Worldbuilding' },
                { id: 'cul', label: 'Culturas', icon: 'globe', group: 'Worldbuilding' },
                { id: 'mag', label: 'Magia', icon: 'zap', group: 'Worldbuilding' },
                { id: 'esp', label: 'Espécies', icon: 'dna', group: 'Worldbuilding' },
                { id: 'fil', label: 'Filosofias', icon: 'feather', group: 'Worldbuilding' },
                { id: 'met', label: 'Métricas', icon: 'bar-chart-2', group: 'Arquitetura' },
                { id: 'con', label: 'Validador', icon: 'shield-check', group: 'Arquitetura' },
                { id: 'ref', label: 'Referências', icon: 'book', group: 'Logística' },
                { id: 'enc', label: 'Enciclopédia', icon: 'archive', group: 'Logística' },
            ];

            const groups = [...new Set(menu.map(m => m.group))];

            return (
                <aside className="w-64 border-r border-black bg-white flex flex-col h-full z-20">
                    <div className="h-20 flex flex-col justify-center px-8 border-b border-black">
                        <span className="font-black text-lg tracking-tighter uppercase leading-none">MythQuill</span>
                        <span className="text-[8px] font-bold tracking-[4px] text-zinc-400 mt-1 uppercase">v1.0 Architect</span>
                    </div>
                    <div className="flex-1 overflow-y-auto scrollbar-hide py-8 px-6">
                        {groups.map(g => (
                            <div key={g} className="mb-10">
                                <div className="text-[9px] uppercase tracking-[4px] text-zinc-300 font-black mb-4">{g}</div>
                                <div className="space-y-1">
                                    {menu.filter(m => m.group === g).map(m => (
                                        <button
                                            key={m.id} onClick={() => setTab(m.id)}
                                            className={`w-full flex items-center gap-3 px-4 py-2.5 text-[10px] font-bold tracking-widest uppercase transition-all ${activeTab === m.id ? 'bg-black text-white' : 'text-zinc-500 hover:text-black hover:bg-zinc-50'}`}
                                        >
                                            <Icon name={m.icon} className="w-3 h-3" />
                                            {m.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-8 border-t border-zinc-100 italic text-[10px] text-zinc-300">
                        Horizonte: 3–10 Anos
                    </div>
                </aside>
            );
        };

        // --- MODULES ---

        const ModCells = () => {
            const [cells, setCells] = useState(() => load('cells', []));
            const [selId, setSelId] = useState(null);
            useEffect(() => save('cells', cells), [cells]);
            const active = cells.find(c => c.id === selId);

            const add = () => {
                const n = { id: Date.now(), title: '', status: 'ideação', words: 0, content: '', summary: '', state: 'indefinido', arcs: '' };
                setCells([...cells, n]);
                setSelId(n.id);
            };
            const update = (f, v) => setCells(cells.map(c => c.id === selId ? { ...c, [f]: v } : c));

            return (
                <div class="flex h-full w-full bg-white text-black">
                    <div class="w-72 border-r border-zinc-100 flex flex-col">
                        <div class="p-6 border-b border-zinc-100">
                            <Btn variant="primary" className="w-full" icon="plus" onClick={add}>Nova Célula</Btn>
                        </div>
                        <div class="flex-1 overflow-y-auto scrollbar-custom p-4 space-y-2">
                            {cells.map((c, i) => (
                                <button key={c.id} onClick={() => setSelId(c.id)} className={`w-full p-6 text-left border ${selId === c.id ? 'border-black bg-zinc-50' : 'border-zinc-100 hover:border-zinc-300'}`}>
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-[9px] font-black uppercase text-zinc-300 tracking-tighter">EST {String(i + 1).padStart(3, '0')}</span>
                                        <span class="text-[9px] font-mono text-zinc-400 uppercase italic">{c.words || 0} p.</span>
                                    </div>
                                    <div class="text-xs font-black uppercase tracking-tight truncate">{c.title || 'Sem Título'}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-16 scrollbar-custom">
                        {active ? (
                            <div class="max-w-4xl mx-auto pb-40">
                                <section class="mb-16">
                                    <span class="text-[9px] text-zinc-400 font-black uppercase tracking-[5px] block mb-4">Módulo de Estrutura Narrativa</span>
                                    <input
                                        value={active.title} onChange={e => update('title', e.target.value)} placeholder="Título da Célula..."
                                        className="bg-transparent text-5xl font-serif text-black outline-none w-full border-b-2 border-zinc-100 focus:border-black pb-4 italic"
                                    />
                                </section>

                                <div class="grid grid-cols-3 gap-12 mb-16">
                                    <div class="col-span-2">
                                        <label class="text-[9px] uppercase tracking-[3px] text-black font-black mb-4 block">Microestado Sistêmico</label>
                                        <div class="flex flex-wrap gap-2">
                                            {['indefinido', 'incisão', 'percurso', 'fusão', 'suspensão', 'clímax'].map(m => (
                                                <button key={m} onClick={() => update('state', m)} className={`px-4 py-2 text-[10px] font-bold border uppercase tracking-widest transition-all ${active.state === m ? 'bg-black text-white border-black' : 'border-zinc-200 text-zinc-400 hover:border-black hover:text-black'}`}>{m}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div class="border-l border-zinc-100 pl-12 flex flex-col justify-center">
                                        <label class="text-[9px] uppercase tracking-[3px] text-zinc-400 font-bold mb-1 block">Métrica de Extensão</label>
                                        <div class="text-4xl font-black">{active.words} <span class="text-[10px] text-zinc-300 uppercase letter-spacing-1">palavras</span></div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-12 mb-12">
                                    <Area label="Workflow de Ideação" value={active.summary} onChange={v => update('summary', v)} rows={3} placeholder="O que esta célula move no sistema?" />
                                    <Area label="Convergência de Arcos" value={active.arcs} onChange={v => update('arcs', v)} rows={3} placeholder="Personagens e stakes envolvidos..." />
                                </div>

                                <div class="mt-16 pt-16 border-t border-black">
                                    <label class="text-[9px] uppercase tracking-[3px] text-black font-black mb-8 block">Manuscrito (Processamento em Fluxo)</label>
                                    <textarea
                                        value={active.content} onChange={e => { update('content', e.target.value); update('words', e.target.value.split(/\s+/).filter(x => x).length); }}
                                        rows={40}
                                        className="w-full bg-white font-serif text-xl leading-relaxed text-zinc-800 outline-none resize-none placeholder:text-zinc-200"
                                        placeholder="Inicie a decodificação narrativa..."
                                    />
                                </div>
                                <div class="mt-20">
                                    <Btn variant="danger" icon="trash-2" onClick={() => { if (confirm('Eliminar Célula?')) { setCells(cells.filter(x => x.id !== selId)); setSelId(null); } }}>Eliminar Registro</Btn>
                                </div>
                            </div>
                        ) : (
                            <div class="h-full flex flex-col items-center justify-center opacity-10">
                                <Icon name="layout" className="text-[200px] mb-8" />
                                <p class="uppercase tracking-[20px] font-black text-xl italic">Arquiteto</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const EntityModule = ({ type, title, icon, fields, storageKey }) => {
            const [items, setItems] = useState(() => load(storageKey, []));
            const [selId, setSelId] = useState(null);
            useEffect(() => save(storageKey, items), [items]);
            const active = items.find(i => i.id === selId);

            const add = () => {
                const n = { id: Date.now(), name: `Nova Entrada (${title})`, type: 'padrão' };
                fields.forEach(f => n[f.k] = '');
                setItems([...items, n]);
                setSelId(n.id);
            }
            const update = (f, v) => setItems(items.map(i => i.id === selId ? { ...i, [f]: v } : i));

            return (
                <div class="flex h-full w-full bg-white text-black">
                    <div class="w-72 border-r border-zinc-100 flex flex-col shadow-sm">
                        <div class="p-6 border-b border-black">
                            <Btn variant="primary" className="w-full" icon={icon} onClick={add}>Nova {title}</Btn>
                        </div>
                        <div class="flex-1 overflow-y-auto scrollbar-custom p-4 space-y-2">
                            {items.map(i => (
                                <button key={i.id} onClick={() => setSelId(i.id)} className={`w-full p-6 text-left border ${selId === i.id ? 'border-black bg-zinc-50' : 'border-zinc-100 hover:border-zinc-300'}`}>
                                    <div class="text-[9px] font-black uppercase text-zinc-300 tracking-widest mb-1">{i.type || 'ENTIDADE'}</div>
                                    <div class="text-xs font-black uppercase truncate">{i.name}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-16 scrollbar-custom">
                        {active ? (
                            <div class="max-w-4xl mx-auto pb-40">
                                <header class="mb-16 border-b border-black pb-12">
                                    <span class="text-[9px] text-zinc-400 font-black uppercase tracking-[5px] block mb-4">Modelagem de Worldbuilding / {title}</span>
                                    <input
                                        value={active.name} onChange={e => update('name', e.target.value)}
                                        className="bg-transparent text-5xl font-serif font-black text-black outline-none w-full italic"
                                    />
                                </header>
                                <div class="grid grid-cols-2 gap-16">
                                    {fields.map(f => (
                                        <div key={f.k} class={f.full ? 'col-span-2' : ''}>
                                            {f.type === 'area' ? <Area label={f.l} value={active[f.k]} onChange={v => update(f.k, v)} rows={f.rows || 3} placeholder={f.p} /> : <Input label={f.l} value={active[f.k]} onChange={v => update(f.k, v)} placeholder={f.p} />}
                                        </div>
                                    ))}
                                </div>
                                <div class="mt-20 border-t border-zinc-100 pt-12">
                                    <Btn variant="danger" icon="trash" onClick={() => { if (confirm('Arquivar?')) { setItems(items.filter(x => x.id !== selId)); setSelId(null); } }}>Arquivar Registro</Btn>
                                </div>
                            </div>
                        ) : (
                            <div class="h-full flex flex-col items-center justify-center opacity-10">
                                <Icon name={icon} className="text-[200px] mb-8" />
                                <p class="uppercase tracking-[20px] font-black text-xl italic">{title}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const ModMetrics = () => {
            return (
                <div class="p-20 h-full bg-white overflow-y-auto scrollbar-custom">
                    <div class="max-w-6xl mx-auto">
                        <header class="mb-24 flex justify-between items-end border-b-4 border-black pb-12">
                            <div>
                                <h1 class="text-6xl font-serif font-black italic mb-4">Métricas Narrativas</h1>
                                <p class="text-zinc-400 font-black text-[10px] tracking-[8px] uppercase">Análise de Fluxo e Convergência</p>
                            </div>
                            <div class="text-right">
                                <div class="text-[10px] font-black uppercase tracking-[3px] mb-2">Estado Sistêmico</div>
                                <div class="px-6 py-2 bg-black text-white text-xs font-black tracking-widest">FUNCIONAL</div>
                            </div>
                        </header>
                        <div class="grid grid-cols-3 gap-16 mb-24">
                            <div class="p-10 border-2 border-zinc-100">
                                <h4 class="text-[10px] font-black uppercase tracking-widest mb-6">Densidade de Conflito</h4>
                                <div class="flex items-end gap-2 h-20 mb-6">
                                    {[2, 4, 7, 3, 5, 9, 4, 2, 6, 8, 10, 3].map((v, i) => <div key={i} class="flex-1 bg-zinc-100 relative"><div class="absolute bottom-0 w-full bg-black transition-all" style={{ height: `${v * 10}%` }}></div></div>)}
                                </div>
                                <p class="text-[10px] font-bold text-zinc-400 italic">Oscilação constante detectada.</p>
                            </div>
                            <div class="p-10 border-2 border-zinc-100">
                                <h4 class="text-[10px] font-black uppercase tracking-widest mb-6">Progressão de Tensão</h4>
                                <div class="h-20 border-b border-black relative mb-6">
                                    <svg class="w-full h-full"><path d="M0,70 Q25,60 50,40 T100,10" fill="none" stroke="black" stroke-width="3" /></svg>
                                </div>
                                <p class="text-[10px] font-bold text-zinc-400 italic">Tendência à convergência crítica.</p>
                            </div>
                            <div class="p-10 border-2 border-zinc-100">
                                <h4 class="text-[10px] font-black uppercase tracking-widest mb-6">Foco de Personagem</h4>
                                <div class="space-y-4">
                                    {['Protagonista', 'Antagonista', 'Sistemas'].map((p, i) => (
                                        <div key={p}>
                                            <div class="flex justify-between text-[9px] font-bold mb-1"><span>{p.toUpperCase()}</span><span>{[84, 12, 4][i]}%</span></div>
                                            <div class="w-full h-1 bg-zinc-100"><div class="h-full bg-black" style={{ width: `${[84, 12, 4][i]}%` }}></div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const ModValidator = () => {
            const AXIOMAS = [
                { id: 1, text: "O Entre é uma condição permanente, não um local." },
                { id: 2, text: "A linguagem limita a percepção, não o mundo." },
                { id: 3, text: "Toda ação causal gera ruído sistêmico." }
            ];
            return (
                <div class="p-20 h-full bg-zinc-50 overflow-y-auto scrollbar-custom">
                    <div class="max-w-4xl mx-auto">
                        <header class="mb-20">
                            <h1 class="text-5xl font-serif font-black italic mb-4">Detecção de Incoerências</h1>
                            <div class="w-12 h-1 bg-black"></div>
                        </header>

                        <div class="space-y-8 mb-20">
                            <h2 class="text-[10px] font-black uppercase tracking-[5px] text-zinc-400 mb-8">Base de Axiomas</h2>
                            {AXIOMAS.map(a => (
                                <div key={a.id} class="p-8 border border-zinc-200 bg-white shadow-sm">
                                    <div class="text-[8px] font-black text-zinc-300 uppercase mb-2 tracking-widest">Regra Operacional {a.id}</div>
                                    <p class="text-xl font-serif italic text-black leading-tight">"{a.text}"</p>
                                </div>
                            ))}
                        </div>

                        <div class="space-y-4">
                            <h2 class="text-[10px] font-black uppercase tracking-[5px] text-zinc-400 mb-8">Alertas de Sistema</h2>
                            <div class="p-8 border border-red-200 bg-red-50 flex gap-8 items-center">
                                <Icon name="alert-octagon" className="text-red-600 text-3xl" />
                                <div>
                                    <h4 class="text-[10px] font-black uppercase text-red-600 tracking-widest mb-2 italic">Contradição Causal</h4>
                                    <p class="text-sm font-bold text-zinc-800 italic">"A distância temporal no Cap 04 desafia a lógica espacial estabelecida. Possível lacuna de motivação."</p>
                                </div>
                                <Btn variant="primary" className="ml-auto text-[9px]">Corrigir Matriz</Btn>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const ModRefs = () => {
            const [refs, setRefs] = useState(() => load('refs', [
                { id: 1, title: "Carol e o Fim do Mundo", type: "Audiovisual", tags: ["premise", "absurd"], logic: "A rotina como resistência ao fim." },
                { id: 2, title: "A Paixão Segundo G.H.", type: "Literatura", tags: ["voice", "dissolution"], logic: "O desmantelamento humano." }
            ]));
            return (
                <div class="p-20 h-full bg-white overflow-y-auto">
                    <div class="max-w-6xl mx-auto">
                        <header class="mb-20 border-b-2 border-black pb-12">
                            <h1 class="text-5xl font-serif font-black italic">Logística de Referências</h1>
                            <p class="text-zinc-400 text-[10px] mt-4 font-mono tracking-[4px] uppercase">Fundamentos e Inspirações Sistêmicas</p>
                        </header>
                        <div class="grid grid-cols-2 gap-12">
                            {refs.map(r => (
                                <div key={r.id} class="p-12 border-2 border-zinc-100 hover:border-black transition-all">
                                    <span class="text-[9px] font-black uppercase tracking-widest text-zinc-300 mb-4 block underline decoration-black">{r.type}</span>
                                    <h3 class="text-3xl font-serif italic font-black text-black leading-none mb-6">{r.title}</h3>
                                    <p class="text-sm text-zinc-500 italic mb-8 border-l-2 border-zinc-100 pl-4">"{r.logic}"</p>
                                    <div class="flex gap-2">
                                        {r.tags.map(t => <span key={t} class="text-[8px] border border-zinc-200 px-2 py-1 uppercase font-black text-zinc-400">#{t}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            )
        }

        // --- MASTER APP ---
        const App = () => {
            const [tab, setTab] = useState('est');
            const [saveStatus, setSaveStatus] = useState('saved');

            useEffect(() => {
                const handle = () => {
                    setSaveStatus('saving');
                    setTimeout(() => setSaveStatus('saved'), 1000);
                };
                window.addEventListener('mq-update', handle);
                return () => window.removeEventListener('mq-update', handle);
            }, []);

            const renderContent = () => {
                switch (tab) {
                    case 'est': return <ModCells />;
                    case 'per': return <EntityModule type="per" title="Personagem" icon="users" storageKey="persons" fields={[{ k: 'role', l: 'FUNÇÃO' }, { k: 'desire', l: 'DESEJO LATENTE' }, { k: 'strategy', l: 'ESTRATÉGIA NARRATIVA', type: 'area' }, { k: 'notes', l: 'OBSERVAÇÕES', type: 'area', full: true }]} />;
                    case 'loc': return <EntityModule type="loc" title="Local" icon="map-pin" storageKey="locals" fields={[{ k: 'type', l: 'TIPO' }, { k: 'logic', l: 'LÓGICA', type: 'area' }, { k: 'desc', l: 'DESCRIÇÃO SENSORIAL', type: 'area', full: true }]} />;
                    case 'tmp': return <EntityModule type="tmp" title="Evento" icon="clock" storageKey="timeline" fields={[{ k: 'date', l: 'DATA' }, { k: 'impact', l: 'IMPACTO', type: 'area' }, { k: 'causality', l: 'CAUSALIDADE', type: 'area', full: true }]} />;
                    case 'rel': return <EntityModule type="rel" title="Relação" icon="git-merge" storageKey="relations" fields={[{ k: 'pair', l: 'PARTES' }, { k: 'dynamic', l: 'DINÂMICA', type: 'area' }, { k: 'evolution', l: 'EVOLUÇÃO', type: 'area', full: true }]} />;
                    case 'sis': return <EntityModule type="sis" title="Sistema" icon="settings" storageKey="systems" fields={[{ k: 'rules', l: 'REGRAS', type: 'area' }, { k: 'pressure', l: 'MECANISMO DE PRESSÃO', type: 'area', full: true }]} />;
                    case 'cul': return <EntityModule type="cul" title="Cultura" icon="globe" storageKey="cultures" fields={[{ k: 'values', l: 'VALORES', type: 'area' }, { k: 'ritual', l: 'RITOS', type: 'area', full: true }]} />;
                    case 'mag': return <EntityModule type="mag" title="Magia" icon="zap" storageKey="magic" fields={[{ k: 'source', l: 'FONTE' }, { k: 'cost', l: 'CUSTO NARRATIVO', type: 'area' }, { k: 'laws', l: 'LEIS', type: 'area', full: true }]} />;
                    case 'esp': return <EntityModule type="esp" title="Espécie" icon="dna" storageKey="species" fields={[{ k: 'traits', l: 'CARACTERÍSTICAS' }, { k: 'origin', l: 'ORIGEM SISTÊMICA', type: 'area', full: true }]} />;
                    case 'fil': return <EntityModule type="fil" title="Filosofia" icon="feather" storageKey="philosophy" fields={[{ k: 'core', l: 'ESSÊNCIA' }, { k: 'dilemma', l: 'DILEMA CENTRAL', type: 'area', full: true }]} />;
                    case 'met': return <ModMetrics />;
                    case 'con': return <ModValidator />;
                    case 'ref': return <ModRefs />;
                    case 'enc': return <EntityModule type="enc" title="Verbete" icon="archive" storageKey="wiki" fields={[{ k: 'desc', l: 'DESCRIÇÃO', type: 'area', full: true }]} />;
                    default: return <div class="p-20 opacity-10">Módulo em Processamento...</div>;
                }
            };

            return (
                <div class="flex h-screen w-full bg-white overflow-hidden text-black selection:bg-black selection:text-white">
                    <Sidebar activeTab={tab} setTab={setTab} />
                    <main class="flex-1 flex flex-col min-w-0 bg-white border-l border-black">
                        <header class="h-20 flex items-center justify-between px-12 border-b border-black">
                            <div class="flex items-center gap-12">
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-black tracking-[4px] uppercase text-zinc-300">Responsável Operacional</span>
                                    <span class="text-xs font-black uppercase italic">Arquiteto de Dashboard</span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class={`w-2 h-2 rounded-full ${saveStatus === 'saving' ? 'bg-zinc-200 animate-pulse' : 'bg-black'}`}></div>
                                    <span class="text-[9px] font-black uppercase tracking-[2px]">{saveStatus === 'saving' ? 'Sincronizando...' : 'Sistema Estável'}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <Btn variant="ghost" icon="search"></Btn>
                                <Btn variant="primary" className="h-10 px-6">Agente Cognitivo</Btn>
                            </div>
                        </header>

                        <section class="flex-1 overflow-hidden relative">
                            {renderContent()}
                        </section>

                        <footer class="h-20 border-t border-black px-12 flex items-center justify-between gap-16">
                            <div class="flex gap-12 items-center">
                                <div class="flex flex-col">
                                    <span class="text-[8px] font-black uppercase tracking-[3px] text-zinc-300 mb-1">Caudas de Tensão</span>
                                    <div class="flex items-end gap-1 h-6">
                                        {[2, 5, 3, 8, 4, 10, 7, 5, 3].map((v, i) => <div key={i} class="w-1 bg-zinc-100 relative h-full"><div class="absolute bottom-0 w-full bg-black" style={{ height: `${v * 10}%` }}></div></div>)}
                                    </div>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[8px] font-black uppercase tracking-[3px] text-zinc-300 mb-1">Clímax Preditivo</span>
                                    <div class="text-[10px] font-black uppercase tracking-tighter">74.2% Convergente</div>
                                </div>
                            </div>

                            <div class="flex-1 max-w-2xl relative">
                                <input
                                    type="text"
                                    placeholder="Inserir Comando de Análise..."
                                    className="w-full bg-zinc-50 border border-zinc-100 rounded-none py-3 px-8 text-[10px] font-bold uppercase tracking-widest outline-none focus:border-black transition-all"
                                />
                            </div>

                            <div class="flex gap-12 items-center text-right">
                                <div>
                                    <div class="text-[8px] font-black uppercase tracking-[3px] text-zinc-300">Versão de Modelo</div>
                                    <div class="text-[10px] font-black font-mono">MQ-ARCH-V1</div>
                                </div>
                                <div class="w-10 h-10 border border-black flex items-center justify-center font-black">?</div>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
