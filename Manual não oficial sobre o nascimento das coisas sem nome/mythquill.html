<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MythQuill — Absolute Engine</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.1.1/font/lucide.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: {
              50: '#F0F9F9',
              100: '#D9F0F0',
              200: '#B3E1E1',
              300: '#8ACFCE',
              400: '#5FB6B4',
              500: '#3D9B99',
              600: '#2E7D7C',
              700: '#246362',
              800: '#1A4A49',
              900: '#0F2C2C',
              950: '#081717',
            },
            emerald: {
              500: '#10B981',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #081717;
      color: #E2E8F0;
    }

    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }

    .border-petrol {
      border-color: rgba(255, 255, 255, 0.08);
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-custom::-webkit-scrollbar {
      width: 4px;
    }

    .scrollbar-custom::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollbar-custom::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .sudowrite-card {
      background: #0F2C2C;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    .sudowrite-card:hover {
      background: #153A3A;
      border-color: rgba(16, 185, 129, 0.3);
    }

    @keyframes rainbow {
      0% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }

      100% {
        background-position: 0% 50%
      }
    }

    .animate-rainbow {
      background: linear-gradient(90deg, #10B981, #3B82F6, #8B5CF6, #EC4899, #10B981);
      background-size: 200% auto;
      animation: rainbow 4s linear infinite;
    }
  </style>
</head>

<body class="overflow-hidden font-sans">
  <div id="root" class="h-screen flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- STORAGE ---
    const SP = 'mythquill-';
    const load = (k, d) => { try { const r = localStorage.getItem(SP + k); return r ? JSON.parse(r) : d; } catch { return d; } };
    const save = (k, v) => { try { localStorage.setItem(SP + k, JSON.stringify(v)); } catch { } window.dispatchEvent(new CustomEvent('mq-update', { detail: { k } })); };

    // --- UI ATOMS ---
    const Icon = ({ name, className = "" }) => <i className={`lucide-${name} ${className}`}></i>;

    const Btn = ({ children, onClick, variant = "ghost", className = "", icon }) => {
      const themes = {
        ghost: "hover:bg-white/5 text-slate-400 hover:text-white",
        solid: "bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-500/20",
        outline: "border border-white/10 hover:border-emerald-500/50 text-slate-300 hover:text-white hover:bg-white/5",
        danger: "text-rose-400 hover:bg-rose-500/10 hover:text-rose-300"
      };
      return (
        <button onClick={onClick} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${themes[variant]} ${className}`}>
          {icon && <Icon name={icon} />}
          {children}
        </button>
      );
    };

    const Input = ({ label, value, onChange, placeholder, type = "text" }) => (
      <div className="mb-4">
        {label && <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1.5 block font-mono">{label}</label>}
        <input
          type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
          className="w-full bg-white/5 border-b border-white/10 focus:border-emerald-500/50 py-2 outline-none text-sm transition-all focus:bg-white/[0.07] px-2 rounded-t"
        />
      </div>
    );

    const Area = ({ label, value, onChange, placeholder, rows = 4 }) => (
      <div className="mb-4">
        {label && <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1.5 block font-mono">{label}</label>}
        <textarea
          value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
          className="w-full bg-white/5 border border-white/10 focus:border-emerald-500/50 p-3 outline-none text-sm leading-relaxed transition-all focus:bg-white/[0.07] rounded-lg resize-none"
        />
      </div>
    );

    // --- COMPONENTS ---
    const Sidebar = ({ activeTab, setTab }) => {
      const menu = [
        { id: 'est', label: 'CÉLULAS', icon: 'layout', group: 'Estrutura' },
        { id: 'per', label: 'ENTIDADES', icon: 'users', group: 'Universo' },
        { id: 'loc', label: 'LOCAIS', icon: 'map-pin', group: 'Universo' },
        { id: 'tmp', label: 'TEMPO', icon: 'clock', group: 'Universo' },
        { id: 'sis', label: 'SISTEMAS', icon: 'settings', group: 'Worldbuilding' },
        { id: 'cul', label: 'CULTURAS', icon: 'globe', group: 'Worldbuilding' },
        { id: 'mag', label: 'SIMBÓLICA', icon: 'zap', group: 'Worldbuilding' },
        { id: 'esp', label: 'ESPÉCIES', icon: 'fingerprint', group: 'Worldbuilding' },
        { id: 'fil', label: 'FILOSOFIAS', icon: 'feather', group: 'Worldbuilding' },
        { id: 'met', label: 'ANALYTICS', icon: 'bar-chart-2', group: 'Agente' },
        { id: 'con', label: 'VALIDADOR', icon: 'shield-check', group: 'Agente' },
        { id: 'ref', label: 'BIBLIOTECA', icon: 'book', group: 'Recursos' },
        { id: 'enc', label: 'WIKI', icon: 'archive', group: 'Recursos' },
      ];

      const groups = [...new Set(menu.map(m => m.group))];

      return (
        <aside className="w-60 bg-petrol-950 border-r border-white/5 flex flex-col h-full z-20 shadow-2xl">
          <div className="h-16 flex items-center px-6 gap-3 border-b border-white/5">
            <div className="w-6 h-6 rounded bg-emerald-500 flex items-center justify-center font-bold text-xs">M</div>
            <span className="font-bold tracking-tight text-sm uppercase letter-spacing-1 text-slate-200">MythQuill <span className="text-[10px] text-emerald-500">ABS</span></span>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-hide py-4 px-3">
            {groups.map(g => (
              <div key={g} className="mb-6">
                <div className="px-3 text-[10px] uppercase tracking-[2px] text-slate-600 font-bold mb-2">{g}</div>
                {menu.filter(m => m.group === g).map(m => (
                  <button
                    key={m.id} onClick={() => setTab(m.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-xs font-medium transition-all mb-0.5 ${activeTab === m.id ? 'bg-emerald-500/10 text-emerald-500' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}
                  >
                    <Icon name={m.icon} className="text-sm opacity-70" />
                    {m.label}
                  </button>
                ))}
              </div>
            ))}
          </div>
        </aside>
      );
    };

    // --- SUB-MODULES (Logical Units) ---

    // CÉLULAS (Chapter Editor)
    const ModCells = () => {
      const [cells, setCells] = useState(() => load('cells', []));
      const [selId, setSelId] = useState(null);
      useEffect(() => save('cells', cells), [cells]);
      const active = cells.find(c => c.id === selId);
      const add = () => {
        const n = { id: Date.now(), title: '', status: 'draft', words: 0, content: '', summary: '', microstate: 'indefinido' };
        setCells([...cells, n]);
        setSelId(n.id);
      };
      const update = (f, v) => setCells(cells.map(c => c.id === selId ? { ...c, [f]: v } : c));

      return (
        <div class="flex h-full w-full">
          <div class="w-64 border-r border-white/5 flex flex-col bg-petrol-900/50">
            <div class="p-4 border-b border-white/5">
              <Btn variant="solid" className="w-full" icon="plus" onClick={add}>NOVA CÉLULA</Btn>
            </div>
            <div class="flex-1 overflow-y-auto scrollbar-custom p-2">
              {cells.map((c, i) => (
                <button key={c.id} onClick={() => setSelId(c.id)} className={`w-full p-4 mb-2 rounded-xl text-left transition-all border ${selId === c.id ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-white/[0.02] border-white/5 hover:bg-white/[0.04]'}`}>
                  <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-mono text-emerald-500 font-bold tracking-tighter">C{String(i + 1).padStart(2, '0')}</span>
                    <span class="text-[9px] text-slate-500 font-mono italic">{c.words || 0} p.</span>
                  </div>
                  <div class="text-xs font-bold text-slate-200 truncate">{c.title || 'Sem título'}</div>
                </button>
              ))}
            </div>
          </div>
          <div class="flex-1 overflow-y-auto p-12 scrollbar-custom bg-petrol-900/20">
            {active ? (
              <div class="max-w-3xl mx-auto pb-32">
                <header class="mb-10 flex justify-between items-end">
                  <div class="flex-1">
                    <span class="text-[10px] text-emerald-500 font-bold tracking-widest uppercase font-mono block mb-2">Editor de Célula</span>
                    <input
                      value={active.title} onChange={e => update('title', e.target.value)} placeholder="Título da Célula..."
                      className="bg-transparent text-3xl font-serif text-white outline-none w-full border-b border-white/10 focus:border-emerald-500/30 pb-2 italic"
                    />
                  </div>
                  <Btn variant="danger" icon="trash" onClick={() => { if (confirm('Remover?')) setCells(cells.filter(x => x.id !== selId)) }} />
                </header>

                <div class="grid grid-cols-2 gap-8 mb-10">
                  <div class="sudowrite-card p-6 rounded-2xl">
                    <label class="text-[10px] uppercase tracking-widest text-emerald-500 font-bold mb-4 block font-mono">MICROESTADO</label>
                    <div class="flex flex-wrap gap-2">
                      {['indefinido', 'incisão', 'percurso', 'fusão', 'suspensão'].map(m => (
                        <button key={m} onClick={() => update('microstate', m)} className={`px-2 py-1 rounded text-[9px] font-bold border uppercase tracking-wider ${active.microstate === m ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400' : 'bg-white/5 border-white/10 text-slate-500'}`}>{m}</button>
                      ))}
                    </div>
                  </div>
                  <div class="sudowrite-card p-6 rounded-2xl flex flex-col justify-center">
                    <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1 block font-mono">CONTAGEM</label>
                    <div class="text-2xl font-mono font-bold text-white tracking-widest">{active.words} <span class="text-xs text-slate-600 font-normal">PALAVRAS</span></div>
                  </div>
                </div>

                <div class="grid grid-cols-1 gap-8 mb-8">
                  <Area label="RESUMO ANALÍTICO" value={active.summary} onChange={v => update('summary', v)} rows={3} placeholder="O que esta célula move?" />
                </div>

                <div class="mt-8 border-t border-white/5 pt-10">
                  <textarea
                    value={active.content} onChange={e => { update('content', e.target.value); update('words', e.target.value.split(/\s+/).filter(x => x).length); }}
                    rows={30}
                    className="w-full bg-transparent font-serif text-xl leading-relaxed text-slate-300 outline-none resize-none placeholder:text-slate-800 placeholder:italic transition-all"
                    placeholder="Escreva como se a linguagem fosse o limite do mundo..."
                  />
                </div>
              </div>
            ) : (
              <div class="h-full flex flex-col items-center justify-center text-slate-800">
                <Icon name="feather" className="text-9xl mb-12 opacity-5" />
                <p class="uppercase tracking-[12px] font-bold text-xs opacity-20">Projetar Estrutura</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    // GENERATIVE ENTITIES (Unified Component)
    const ModEntity = ({ type, title, icon, color, fields, storageKey }) => {
      const [items, setItems] = useState(() => load(storageKey, []));
      const [selId, setSelId] = useState(null);
      useEffect(() => save(storageKey, items), [items]);
      const active = items.find(i => i.id === selId);
      const add = () => {
        const n = { id: Date.now(), name: `Novo ${title}`, type: 'indefinido' };
        fields.forEach(f => n[f.k] = '');
        setItems([...items, n]);
        setSelId(n.id);
      };
      const update = (f, v) => setItems(items.map(i => i.id === selId ? { ...i, [f]: v } : i));

      return (
        <div class="flex h-full w-full">
          <div class="w-64 border-r border-white/5 flex flex-col bg-petrol-900/50">
            <div class="p-4 border-b border-white/5">
              <Btn variant="solid" className="w-full" icon={icon} onClick={add}>NOVO {title.toUpperCase()}</Btn>
            </div>
            <div class="flex-1 overflow-y-auto scrollbar-custom p-2">
              {items.map(i => (
                <button key={i.id} onClick={() => setSelId(i.id)} className={`w-full p-4 mb-2 rounded-xl text-left transition-all border ${selId === i.id ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-white/[0.02] border-white/5 hover:bg-white/[0.04]'}`}>
                  <div class="text-xs font-bold text-slate-200 truncate">{i.name || 'Sem nome'}</div>
                  <div class="text-[9px] text-slate-600 uppercase font-mono mt-1 italic tracking-widest">{i.type || i.role || ''}</div>
                </button>
              ))}
              {items.length === 0 && <div class="p-8 text-center text-[10px] text-slate-700 font-mono italic opacity-30">Vazio</div>}
            </div>
          </div>
          <div class="flex-1 overflow-y-auto p-12 scrollbar-custom bg-petrol-900/20">
            {active ? (
              <div class="max-w-3xl mx-auto pb-32">
                <header class="mb-10 flex gap-6 items-center border-b border-white/5 pb-8">
                  <div class="w-16 h-16 rounded-3xl flex items-center justify-center text-2xl" style={{ backgroundColor: color + '22', color: color }}>
                    <Icon name={icon} />
                  </div>
                  <div class="flex-1">
                    <span class="text-[10px] text-slate-500 font-bold tracking-[4px] uppercase font-mono block mb-2">{title}</span>
                    <input
                      value={active.name} onChange={e => update('name', e.target.value)}
                      className="bg-transparent text-4xl font-serif text-white outline-none w-full italic"
                    />
                  </div>
                  <Btn variant="danger" icon="trash" onClick={() => { if (confirm('Remover?')) setItems(items.filter(x => x.id !== selId)) }} />
                </header>
                <div class="grid grid-cols-2 gap-8">
                  {fields.map(f => (
                    <div key={f.k} class={f.full ? 'col-span-2' : ''}>
                      {f.type === 'area' ? <Area label={f.l} value={active[f.k]} onChange={v => update(f.k, v)} rows={f.rows || 3} placeholder={f.p} /> : <Input label={f.l} value={active[f.k]} onChange={v => update(f.k, v)} placeholder={f.p} />}
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div class="h-full flex flex-col items-center justify-center text-slate-900">
                <Icon name={icon} className="text-[200px] mb-8 opacity-5" />
                <p class="uppercase tracking-[15px] font-bold text-[10px] opacity-20 italic">Matriz de Entidade</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ANALYTICS & VALIDATOR
    const ModValidator = () => {
      const AXIOMAS = [
        { id: 1, text: "O Entre não é um cenário, é uma condição." },
        { id: 2, text: "A percepção precede a linguagem." },
        { id: 3, text: "Toda presença é vazamento." },
        { id: 4, text: "O tempo não passa, ele se acumula." }
      ];
      return (
        <div class="p-16 h-full bg-petrol-900/10 overflow-y-auto scrollbar-custom">
          <div class="max-w-5xl mx-auto">
            <header class="mb-16 border-l-4 border-emerald-500 pl-8">
              <h1 class="text-5xl font-serif text-white italic mb-4">Detector de Consistência</h1>
              <p class="text-slate-500 font-mono text-[10px] tracking-[5px] uppercase">Algoritmo de validação ontológica</p>
            </header>
            <div class="grid grid-cols-2 gap-12">
              <div class="space-y-6">
                <h2 class="text-xs font-bold text-slate-400 tracking-[3px] uppercase mb-8">Axiomas do Projeto</h2>
                {AXIOMAS.map(a => (
                  <div key={a.id} class="sudowrite-card p-8 rounded-3xl border-l-4 border-emerald-500/30">
                    <div class="text-[10px] text-emerald-500 font-mono mb-2 uppercase font-bold tracking-widest">AXIOMA {String(a.id).padStart(2, '0')}</div>
                    <p class="text-white font-serif italic text-lg">{a.text}</p>
                  </div>
                ))}
              </div>
              <div class="space-y-6">
                <h2 class="text-xs font-bold text-slate-400 tracking-[3px] uppercase mb-8">Alertas Ativos</h2>
                <div class="bg-rose-500/5 border border-rose-500/20 p-8 rounded-3xl flex items-start gap-6">
                  <Icon name="alert-circle" className="text-rose-500 text-3xl" />
                  <div>
                    <h4 class="text-rose-500 font-bold uppercase tracking-widest text-xs mb-2 italic">Contradição Causal</h4>
                    <p class="text-slate-400 text-xs italic">"No Capítulo 04, a distância descrita rompe com a lógica de tempo estabelecida na Memória do Pátio."</p>
                    <Btn variant="danger" className="mt-4 text-[9px] border border-rose-500/20">INVESTIGAR MATRIZ</Btn>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const ModRefs = () => {
      const [refs, setRefs] = useState(() => load('refs', [
        { id: 1, title: 'Carol e o Fim do Mundo', type: 'Série', tags: 'premissa, inadequação', logic: 'O cotidiano como resistência.' },
        { id: 2, title: 'A Paixão Segundo G.H.', type: 'Livro', tags: 'voz, sintaxe', logic: 'Desmantelamento da estrutura humana.' }
      ]));
      return <div class="p-16 h-full bg-petrol-900/10 overflow-y-auto scrollbar-custom">
        <div class="max-w-5xl mx-auto">
          <header class="mb-12 flex justify-between items-end">
            <div>
              <h1 class="text-4xl font-serif text-white italic">Biblioteca de Referências</h1>
              <p class="text-slate-600 text-[10px] mt-2 font-mono uppercase tracking-[3px]">Influências e Fundamentos</p>
            </div>
          </header>
          <div class="grid grid-cols-2 gap-8">
            {refs.map(r => (
              <div key={r.id} class="sudowrite-card p-10 rounded-[40px] flex flex-col h-full">
                <div class="flex justify-between items-start mb-6">
                  <div>
                    <span class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest font-mono mb-2 block">{r.type}</span>
                    <h3 class="text-2xl font-serif italic text-white leading-tight">{r.title}</h3>
                  </div>
                </div>
                <p class="text-xs text-slate-500 italic mb-8 flex-1">{r.logic}</p>
                <div class="flex flex-wrap gap-2 mt-auto">
                  {(r.tags || '').split(',').map(t => <span key={t} class="text-[8px] border border-white/5 bg-white/5 px-2 py-0.5 rounded-full text-slate-600 font-bold uppercase tracking-tighter">{t.trim()}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>;
    }

    // --- MASTER APP ---
    const App = () => {
      const [tab, setTab] = useState('est');
      const [saveStatus, setSaveStatus] = useState('saved');

      useEffect(() => {
        const handle = () => {
          setSaveStatus('saving');
          setTimeout(() => setSaveStatus('saved'), 1200);
        };
        window.addEventListener('mq-update', handle);
        return () => window.removeEventListener('mq-update', handle);
      }, []);

      const renderContent = () => {
        switch (tab) {
          case 'est': return <ModCells />;
          case 'per': return <ModEntity type="per" title="Personagem" icon="users" color="#EAB308" storageKey="persons" fields={[{ k: 'role', l: 'FUNÇÃO' }, { k: 'strategy', l: 'ESTRATÉGIA', type: 'area' }, { k: 'notes', l: 'NOTAS', type: 'area', full: true }]} />;
          case 'loc': return <ModEntity type="loc" title="Local" icon="map-pin" color="#10B981" storageKey="locals" fields={[{ k: 'type', l: 'TIPO' }, { k: 'logic', l: 'LÓGICA', type: 'area' }, { k: 'desc', l: 'DESCRIÇÃO', type: 'area', full: true }]} />;
          case 'tmp': return <ModEntity type="tmp" title="Evento" icon="clock" color="#3B82F6" storageKey="timeline" fields={[{ k: 'date', l: 'DATA/ERA' }, { k: 'impact', l: 'IMPACTO', type: 'area' }, { k: 'causality', l: 'CAUSALIDADE', type: 'area', full: true }]} />;
          case 'sis': return <ModEntity type="sis" title="Sistema" icon="settings" color="#8B5CF6" storageKey="systems" fields={[{ k: 'rules', l: 'REGRAS', type: 'area' }, { k: 'pressure', l: 'PRESSÃO', type: 'area', full: true }]} />;
          case 'cul': return <ModEntity type="cul" title="Cultura" icon="globe" color="#F97316" storageKey="cultures" fields={[{ k: 'values', l: 'VALORES', type: 'area' }, { k: 'clutter', l: 'RITOS', type: 'area', full: true }]} />;
          case 'mag': return <ModEntity type="mag" title="Magia" icon="zap" color="#EF4444" storageKey="magic" fields={[{ k: 'cost', l: 'CUSTO' }, { k: 'laws', l: 'LEIS', type: 'area', full: true }]} />;
          case 'esp': return <ModEntity type="esp" title="Espécie" icon="dna" color="#10B981" storageKey="species" fields={[{ k: 'traits', l: 'TRAÇOS', type: 'area', full: true }]} />;
          case 'fil': return <ModEntity type="fil" title="Filosofia" icon="feather" color="#A8A29E" storageKey="philosophy" fields={[{ k: 'core', l: 'ESSÊNCIA', type: 'area', full: true }]} />;
          case 'ref': return <ModRefs />;
          case 'con': return <ModValidator />;
          case 'enc': return <ModEntity type="enc" title="Wiki" icon="archive" color="#64748B" storageKey="wiki" fields={[{ k: 'desc', l: 'DESCRIÇÃO', type: 'area', full: true }]} />;
          default: return <div class="h-full flex items-center justify-center opacity-20 font-mono tracking-[10px] text-xs uppercase animate-pulse">Expandindo Matriz {tab}</div>;
        }
      };

      return (
        <div class="flex h-screen w-full bg-petrol-950 overflow-hidden text-slate-400 selection:bg-emerald-500/30">
          <Sidebar activeTab={tab} setTab={setTab} />
          <main className="flex-1 flex flex-col min-w-0 bg-[#081313] relative">
            <header className="h-16 flex items-center justify-between px-10 border-b border-white/5 glass relative z-30">
              <div className="flex items-center gap-8">
                <div class="flex flex-col">
                  <h2 className="text-[11px] font-bold tracking-[6px] text-slate-200 font-mono uppercase flex items-center gap-3">
                    <div class="w-1 h-1 rounded-full bg-emerald-500 shadow-[0_0_8px_#10B981]"></div>
                    MythQuill Absolute
                  </h2>
                  <span class="text-[9px] text-slate-600 font-mono mt-0.5 tracking-[2px]">AGENTE COGNITIVO V</span>
                </div>
                <div className="h-4 w-px bg-white/10 mx-2"></div>
                <div className="flex items-center gap-3">
                  <div className={`w-1.5 h-1.5 rounded-full ${saveStatus === 'saving' ? 'bg-amber-500 animate-pulse' : 'bg-emerald-500'}`}></div>
                  <span className="text-[9px] font-mono text-slate-500 uppercase tracking-widest">{saveStatus === 'saving' ? 'PROCESSANDO...' : 'SISTEMA INTEGRADO'}</span>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div class="h-9 px-6 flex items-center bg-white/5 rounded-full border border-white/10 group hover:border-emerald-500/30 transition-all cursor-help">
                  <span class="text-[9px] font-mono text-slate-500 uppercase tracking-[3px] mr-6">FOCO NARRATIVO</span>
                  <div class="w-24 h-1 bg-white/5 rounded-full overflow-hidden">
                    <div class="w-[84%] h-full animate-rainbow"></div>
                  </div>
                </div>
                <Btn variant="solid" className="rounded-full px-6 h-9" icon="zap">AGENTE</Btn>
              </div>
            </header>

            <section className="flex-1 overflow-hidden relative z-20">
              {renderContent()}
            </section>

            <footer className="h-16 border-t border-white/5 glass px-10 flex items-center justify-between gap-16 relative z-30">
              <div className="flex gap-12 items-center flex-shrink-0">
                <div className="flex flex-col">
                  <span className="text-[8px] uppercase tracking-[3px] text-slate-600 font-bold font-mono mb-1.5">MÉTRICAS DE TENSÃO</span>
                  <div className="flex items-end gap-1 h-6">
                    {[2, 3, 5, 8, 4, 6, 9, 7, 5, 3, 2, 4, 6, 8, 10, 7, 5].map((v, i) => <div key={i} className="w-1 bg-emerald-500/10 rounded-full h-full relative overflow-hidden"><div className="w-full bg-emerald-500 absolute bottom-0 transition-all duration-500" style={{ height: `${v * 10}%` }}></div></div>)}
                  </div>
                </div>
              </div>

              <div className="flex-1 max-w-2xl relative">
                <input
                  type="text"
                  placeholder="Interpretar matriz narrativa..."
                  className="w-full bg-white/5 border border-white/10 rounded-full py-2.5 px-8 text-xs outline-none focus:border-emerald-500/50 transition-all italic tracking-wide"
                />
              </div>

              <div className="flex gap-12 flex-shrink-0 items-center">
                <div className="text-right">
                  <div className="text-[8px] uppercase tracking-[3px] text-slate-600 font-bold font-mono">DENSIDADE DE CLÍMAX</div>
                  <div className="text-[10px] text-emerald-500 font-mono tracking-tighter">74.2% CONVERGENTE</div>
                </div>
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-500/20 to-transparent border border-emerald-500/20 flex items-center justify-center">
                  <Icon name="shield-check" className="text-emerald-500" />
                </div>
              </div>
            </footer>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
