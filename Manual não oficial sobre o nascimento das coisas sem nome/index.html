    // ════════════════════════════════════════════════════════════════
    // CÉLULA: ESTRUTURA CAPITULAR
    // ════════════════════════════════════════════════════════════════
    const MICROESTADOS = {
      dissociacao:       { label: "Dissociação",        cor: "#6B7B8D", descricao: "Presente mas ausente" },
      sedimentacao:      { label: "Sedimentação",       cor: "#8B7355", descricao: "Acúmulo sem sentido" },
      pressao_relacional:{ label: "Pressão Relacional", cor: "#8D6B6B", descricao: "Outro como câmara" },
      suspensao:         { label: "Suspensão",          cor: "#6B5A7A", descricao: "Tempo que circula" },
      ruptura_contida:   { label: "Ruptura Contida",    cor: "#5A6B5A", descricao: "Fratura sem resolução" },
      presenca_parcial:  { label: "Presença Parcial",   cor: "#7A6B5A", descricao: "Corpo antes da mente" },
      linguagem_falha:   { label: "Linguagem Falha",    cor: "#9A8560", descricao: "A palavra que trai" },
    };

    const STATUS_CAP = {
      rascunho:      { label: "Rascunho",      cor: T.text.darker },
      desenvolvimento:{ label: "Em construção", cor: T.accent.gold },
      completo:      { label: "Completo",      cor: T.accent.sage },
    };

    function CelulaEstrutura() {
      const [caps, setCaps] = useState(() => load("estrutura", []));
      const [sel, setSel] = useState(null);
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("estrutura", caps);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [caps]);

      const addCap = () => {
        const novo = {
          id: Date.now(), numero: caps.length + 1, titulo: "",
          microestado: "dissociacao", presencaCorporal: 3, status: "rascunho",
          externo: "", interno: "", notas: "", palavras: 0,
        };
        setCaps([...caps, novo]);
        setSel(novo.id);
      };

      const upd = (id, campo, val) =>
        setCaps(caps.map(c => c.id === id ? { ...c, [campo]: val } : c));

      const del = (id) => {
        const restante = caps.filter(c => c.id !== id).map((c, i) => ({ ...c, numero: i + 1 }));
        setCaps(restante);
        setSel(restante.length > 0 ? restante[restante.length - 1].id : null);
      };

      const cap = caps.find(c => c.id === sel);
      const m = cap ? MICROESTADOS[cap.microestado] : null;

      return (
        <div style={{ display: "flex", height: "100%" }}>
          {/* Sidebar */}
          <div style={{ width: 248, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", background: T.bg.nav, flexShrink: 0 }}>
            <div style={{ padding: "24px 20px 16px", borderBottom: `1px solid ${T.border.primary}` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>EST · Células</div>
              <button onClick={addCap} style={{ width: "100%", padding: "8px 12px", background: T.accent.sage + "18", border: `1px solid ${T.accent.sage}44`, color: T.accent.sage, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>
                + Nova Célula
              </button>
            </div>
            <div style={{ flex: 1, overflowY: "auto" }}>
              {caps.length === 0 && <EmptyMsg msg="Nenhuma célula ainda." />}
              {caps.map(c => {
                const ms = MICROESTADOS[c.microestado];
                return (
                  <button key={c.id} onClick={() => setSel(c.id)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "12px 18px", background: sel === c.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === c.id ? ms.cor : "transparent"}`, textAlign: "left", transition: "background 0.15s" }}>
                    <span style={{ fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, width: 18, flexShrink: 0 }}>{String(c.numero).padStart(2, "0")}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: sel === c.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {c.titulo || "—"}
                      </div>
                      <div style={{ fontSize: 10, color: ms.cor, marginTop: 3, fontFamily: T.font.mono, letterSpacing: 0.5 }}>{ms.label}</div>
                    </div>
                    <div style={{ width: 4, height: 4, borderRadius: "50%", background: STATUS_CAP[c.status]?.cor || T.text.darker, flexShrink: 0 }} />
                  </button>
                );
              })}
            </div>
            <div style={{ padding: "12px 18px", borderTop: `1px solid ${T.border.secondary}` }}>
              <SaveIndicator salvo={salvo} />
            </div>
          </div>

          {/* Editor */}
          {cap ? (
            <div style={{ flex: 1, overflowY: "auto", padding: "40px 52px 60px" }}>
              <div style={{ maxWidth: 680 }}>
                {/* Header do capítulo */}
                <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 36 }}>
                  <span style={{ fontSize: 11, color: T.text.darker, fontFamily: T.font.mono, letterSpacing: 2 }}>
                    CÉLULA {String(cap.numero).padStart(2, "0")}
                  </span>
                  <select value={cap.status} onChange={e => upd(cap.id, "status", e.target.value)}
                    style={{ background: "transparent", border: `1px solid ${T.border.secondary}`, color: STATUS_CAP[cap.status]?.cor, fontSize: 10, letterSpacing: 1, fontFamily: T.font.mono, padding: "3px 8px", textTransform: "uppercase" }}>
                    {Object.entries(STATUS_CAP).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                  <button onClick={() => del(cap.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>
                    remover
                  </button>
                </div>

                <TextInput label="" value={cap.titulo} onChange={v => upd(cap.id, "titulo", v)} placeholder="título da célula (opcional)" size={22} />

                {/* Microestado */}
                <div style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 14, textTransform: "uppercase", fontFamily: T.font.mono }}>Microestado</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {Object.entries(MICROESTADOS).map(([k, v]) => (
                      <button key={k} onClick={() => upd(cap.id, "microestado", k)} style={{ padding: "6px 14px", border: `1px solid ${cap.microestado === k ? v.cor : T.border.secondary}`, background: cap.microestado === k ? v.cor + "18" : "transparent", color: cap.microestado === k ? v.cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2, transition: "all 0.15s" }}>
                        {v.label}
                      </button>
                    ))}
                  </div>
                  {m && <div style={{ marginTop: 10, fontSize: 12, color: T.text.dim, fontStyle: "italic" }}>{m.descricao}</div>}
                </div>

                {/* Presença Corporal */}
                <div style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Presença Corporal</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                    <Dots value={cap.presencaCorporal} onChange={v => upd(cap.id, "presencaCorporal", v)} cor={T.accent.amber} />
                    <span style={{ fontSize: 11, color: T.text.dim }}>
                      {["", "mínima", "baixa", "parcial", "presente", "plena"][cap.presencaCorporal]}
                    </span>
                  </div>
                </div>

                {/* Palavras */}
                <div style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>Contagem de palavras</div>
                  <input type="number" value={cap.palavras || ""} onChange={e => upd(cap.id, "palavras", parseInt(e.target.value) || 0)} placeholder="0"
                    style={{ background: "transparent", border: "none", borderBottom: `1px solid ${T.border.secondary}`, color: T.text.primary, fontSize: 16, padding: "4px 0", width: 100, fontFamily: T.font.mono }} />
                </div>

                <TextArea label="O que acontece" value={cap.externo} onChange={v => upd(cap.id, "externo", v)} rows={4} placeholder="eventos externos, o que a câmara vê..." />
                <TextArea label="O que é sentido" value={cap.interno} onChange={v => upd(cap.id, "interno", v)} rows={4} placeholder="registro interno, ou a falha em registrar..." />
                <TextArea label="Notas" value={cap.notas} onChange={v => upd(cap.id, "notas", v)} rows={3} placeholder="anotações, conexões, questões em aberto..." />
              </div>
            </div>
          ) : (
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <EmptyMsg msg={caps.length === 0 ? "Adicione a primeira célula para começar a estrutura." : "Selecione uma célula para editar."} />
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: PERSONAGENS
    // ════════════════════════════════════════════════════════════════
    const PERS_DEFAULT = [
      { id: 1, nome: "A Protagonista", funcao: "O Entre", cor: T.accent.amber, funcaoDesc: "Habitar o estado de entre — nunca coincidir consigo, nunca resolver o intervalo.", estrategia: "Dissociação como modo de existir. Continua funcionando sem habitar o presente. A lucidez não a liberta.", pressao: "É o centro gravitacional. Todos os outros orbitam sem salvá-la.", caps: [], notas: "Não tem nome. Como a protagonista de Surfacing (Atwood). O nome seria uma forma de fixidez que ela não tem." },
      { id: 2, nome: "Ana", funcao: "Presença Corporal Mínima", cor: T.accent.sage, funcaoDesc: "O que a protagonista não consegue fazer: habitar o corpo como morada no presente.", estrategia: "Presença física como única epistemologia. Não pensa além do que o corpo registra no agora.", pressao: "Pressiona pela existência daquilo que a protagonista não acessa — o presente como fato corporal.", caps: [], notas: "Referenciada em The Midnight Gospel: função de Ana como presença corporal mínima. Contraste e espelho invertido." },
      { id: 3, nome: "Helena", funcao: "Voz da Desistência", cor: T.accent.slate, funcaoDesc: "Externalização do estado interno que não se nomeia — o que acompanha sem decidir.", estrategia: "Acompanha sem resolver. Não insiste, não salva, não desaparece. Está como um ruído de fundo.", pressao: "Representa a possibilidade sempre adiada de parar — mas não executa.", caps: [], notas: "Parentesco com Luci em Desencanto — o demônio pessoal que não decide, apenas está. Voz da desistência." },
    ];

    function CelulaPersonagens() {
      const [pers, setPers] = useState(() => load("personagens", PERS_DEFAULT));
      const [sel, setSel] = useState(pers[0]?.id || null);
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("personagens", pers);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [pers]);

      const caps = useMemo(() => load("estrutura", []), []);

      const addPer = () => {
        const novo = { id: Date.now(), nome: "Novo personagem", funcao: "", cor: T.accent.warm, funcaoDesc: "", estrategia: "", pressao: "", caps: [], notas: "" };
        setPers([...pers, novo]);
        setSel(novo.id);
      };

      const upd = (id, campo, val) => setPers(pers.map(p => p.id === id ? { ...p, [campo]: val } : p));
      const del = (id) => {
        const r = pers.filter(p => p.id !== id);
        setPers(r);
        setSel(r[0]?.id || null);
      };

      const toggleCap = (perId, capId) => {
        const p = pers.find(p => p.id === perId);
        if (!p) return;
        const novaCaps = p.caps.includes(capId) ? p.caps.filter(c => c !== capId) : [...p.caps, capId];
        upd(perId, "caps", novaCaps);
      };

      const per = pers.find(p => p.id === sel);

      return (
        <div style={{ display: "flex", height: "100%" }}>
          {/* Sidebar */}
          <div style={{ width: 248, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", background: T.bg.nav, flexShrink: 0 }}>
            <div style={{ padding: "24px 20px 16px", borderBottom: `1px solid ${T.border.primary}` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>PER · Entidades</div>
              <button onClick={addPer} style={{ width: "100%", padding: "8px 12px", background: T.accent.slate + "18", border: `1px solid ${T.accent.slate}44`, color: T.accent.slate, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>
                + Novo Personagem
              </button>
            </div>
            <div style={{ flex: 1, overflowY: "auto" }}>
              {pers.map(p => (
                <button key={p.id} onClick={() => setSel(p.id)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "13px 18px", background: sel === p.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === p.id ? p.cor : "transparent"}`, textAlign: "left", transition: "background 0.15s" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: p.cor, flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, color: sel === p.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
                    <div style={{ fontSize: 10, color: p.cor, marginTop: 3, fontFamily: T.font.mono, letterSpacing: 0.5 }}>{p.funcao}</div>
                  </div>
                </button>
              ))}
            </div>
            <div style={{ padding: "12px 18px", borderTop: `1px solid ${T.border.secondary}` }}>
              <SaveIndicator salvo={salvo} />
            </div>
          </div>

          {/* Editor */}
          {per ? (
            <div style={{ flex: 1, overflowY: "auto", padding: "40px 52px 60px" }}>
              <div style={{ maxWidth: 680 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 32 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: per.cor }} />
                  <span style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, fontFamily: T.font.mono, textTransform: "uppercase" }}>personagem</span>
                  <button onClick={() => del(per.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>remover</button>
                </div>

                <TextInput label="Nome" value={per.nome} onChange={v => upd(per.id, "nome", v)} placeholder="nome ou designação" size={22} />
                <TextInput label="Função no sistema" value={per.funcao} onChange={v => upd(per.id, "funcao", v)} placeholder="função ontológica (não papel dramático)" />
                <TextArea label="Descrição da função" value={per.funcaoDesc} onChange={v => upd(per.id, "funcaoDesc", v)} rows={2} placeholder="o que este personagem representa no sistema narrativo..." />
                <TextArea label="Estratégia de sobrevivência" value={per.estrategia} onChange={v => upd(per.id, "estrategia", v)} rows={3} placeholder="como existe. não como supera — como persiste." />
                <TextArea label="Como pressiona sem salvar" value={per.pressao} onChange={v => upd(per.id, "pressao", v)} rows={3} placeholder="mecanismo de pressão sobre a protagonista. sem resolução." />

                {/* Células em que aparece */}
                {caps.length > 0 && (
                  <div style={{ marginBottom: 28 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 14, textTransform: "uppercase", fontFamily: T.font.mono }}>Aparece nas células</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {caps.map(c => {
                        const ativo = per.caps.includes(c.id);
                        return (
                          <button key={c.id} onClick={() => toggleCap(per.id, c.id)} style={{ padding: "5px 12px", border: `1px solid ${ativo ? MICROESTADOS[c.microestado]?.cor : T.border.secondary}`, background: ativo ? MICROESTADOS[c.microestado]?.cor + "18" : "transparent", color: ativo ? MICROESTADOS[c.microestado]?.cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>
                            {String(c.numero).padStart(2, "0")} {c.titulo || "—"}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                <TextArea label="Notas" value={per.notas} onChange={v => upd(per.id, "notas", v)} rows={3} placeholder="contexto, inspirações, conexões com referências..." />
              </div>
            </div>
          ) : (
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <EmptyMsg msg="Selecione um personagem para editar." />
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: LINHA DO TEMPO SIMBÓLICO
    // ════════════════════════════════════════════════════════════════
    const TIPOS_TEMPO = {
      sedimentacao:  { label: "Sedimentação",   cor: "#8B7355", descricao: "O que acumula sem virar sentido" },
      dissociacao:   { label: "Dissociação",     cor: "#6B7B8D", descricao: "Presente que não registra" },
      suspensao:     { label: "Suspensão",       cor: "#6B5A7A", descricao: "Tempo que para ou circula" },
      ruptura:       { label: "Ruptura Contida", cor: "#8D6B6B", descricao: "Fratura que não resolve" },
      circulacao:    { label: "Circulação",      cor: "#5A6B5A", descricao: "O mesmo momento que volta" },
    };

    function CelulaLinhaTempo() {
      const [momentos, setMomentos] = useState(() => load("linha-tempo", []));
      const [sel, setSel] = useState(null);
      const [filtro, setFiltro] = useState("todos");
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("linha-tempo", momentos);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [momentos]);

      const caps = useMemo(() => load("estrutura", []), []);

      const addMomento = () => {
        const novo = { id: Date.now(), descricao: "", tipo: "sedimentacao", externo: "", interno: "", simbolico: "", celulaId: null, notas: "" };
        setMomentos([...momentos, novo]);
        setSel(novo.id);
      };

      const upd = (id, campo, val) => setMomentos(momentos.map(m => m.id === id ? { ...m, [campo]: val } : m));
      const del = (id) => {
        const r = momentos.filter(m => m.id !== id);
        setMomentos(r);
        setSel(r.length > 0 ? r[r.length - 1].id : null);
      };

      const visiveis = filtro === "todos" ? momentos : momentos.filter(m => m.tipo === filtro);
      const mom = momentos.find(m => m.id === sel);

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <CelulaHeader sigla="TMP" titulo="Linha do Tempo Simbólico"
            descricao="Não cronologia — estratificação. O tempo de O Entre não avança: sedimenta, circula, falha. Cada momento é classificado pelo que faz ao tempo, não por quando ocorre."
            cor={T.accent.gold}
            extra={<SaveIndicator salvo={salvo} />}
          />

          {/* Filtros + ação */}
          <div style={{ display: "flex", alignItems: "center", gap: 0, padding: "0 48px", borderBottom: `1px solid ${T.border.primary}`, background: T.bg.nav, flexShrink: 0 }}>
            <button onClick={() => setFiltro("todos")} style={{ background: "none", border: "none", padding: "13px 0", marginRight: 24, fontSize: 11, letterSpacing: 1.5, color: filtro === "todos" ? T.text.primary : T.text.darker, borderBottom: `2px solid ${filtro === "todos" ? T.accent.gold : "transparent"}`, textTransform: "uppercase", fontFamily: T.font.mono }}>
              Todos
            </button>
            {Object.entries(TIPOS_TEMPO).map(([k, v]) => (
              <button key={k} onClick={() => setFiltro(k)} style={{ background: "none", border: "none", padding: "13px 0", marginRight: 24, fontSize: 11, letterSpacing: 1.5, color: filtro === k ? v.cor : T.text.darker, borderBottom: `2px solid ${filtro === k ? v.cor : "transparent"}`, textTransform: "uppercase", fontFamily: T.font.mono }}>
                {v.label}
              </button>
            ))}
            <button onClick={addMomento} style={{ marginLeft: "auto", padding: "8px 16px", background: "transparent", border: `1px solid ${T.border.primary}`, color: T.text.dim, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>
              + Momento
            </button>
          </div>

          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            {/* Lista */}
            <div style={{ width: 320, borderRight: `1px solid ${T.border.primary}`, overflowY: "auto", flexShrink: 0 }}>
              {visiveis.length === 0 && <EmptyMsg msg="Nenhum momento registrado ainda." />}
              {visiveis.map((m, idx) => {
                const tt = TIPOS_TEMPO[m.tipo];
                const cap = caps.find(c => c.id === m.celulaId);
                return (
                  <button key={m.id} onClick={() => setSel(m.id)} style={{ display: "flex", gap: 12, width: "100%", padding: "16px 20px", background: sel === m.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === m.id ? tt.cor : "transparent"}`, textAlign: "left", transition: "background 0.15s", alignItems: "flex-start" }}>
                    <div style={{ width: 3, height: "100%", minHeight: 40, background: tt.cor + "66", borderRadius: 2, flexShrink: 0, marginTop: 2 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: sel === m.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 4 }}>
                        {m.descricao || "—"}
                      </div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <Tag texto={tt.label} cor={tt.cor} />
                        {cap && <Tag texto={`CÉL. ${String(cap.numero).padStart(2, "0")}`} cor={T.text.darker} />}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>

            {/* Editor */}
            {mom ? (
              <div style={{ flex: 1, overflowY: "auto", padding: "36px 48px 60px" }}>
                <div style={{ maxWidth: 600 }}>
                  <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
                    <span style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, fontFamily: T.font.mono, textTransform: "uppercase" }}>momento</span>
                    <button onClick={() => del(mom.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>remover</button>
                  </div>

                  <TextInput label="Descrição" value={mom.descricao} onChange={v => upd(mom.id, "descricao", v)} placeholder="o que é este momento..." size={18} />

                  {/* Tipo de tempo */}
                  <div style={{ marginBottom: 28 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Tipo de tempo</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {Object.entries(TIPOS_TEMPO).map(([k, v]) => (
                        <button key={k} onClick={() => upd(mom.id, "tipo", k)} style={{ padding: "6px 14px", border: `1px solid ${mom.tipo === k ? v.cor : T.border.secondary}`, background: mom.tipo === k ? v.cor + "18" : "transparent", color: mom.tipo === k ? v.cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>
                          {v.label}
                        </button>
                      ))}
                    </div>
                    <div style={{ marginTop: 8, fontSize: 12, color: T.text.dim, fontStyle: "italic" }}>{TIPOS_TEMPO[mom.tipo]?.descricao}</div>
                  </div>

                  {/* Célula associada */}
                  {caps.length > 0 && (
                    <div style={{ marginBottom: 28 }}>
                      <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Célula associada</div>
                      <select value={mom.celulaId || ""} onChange={e => upd(mom.id, "celulaId", e.target.value ? parseInt(e.target.value) : null)}
                        style={{ background: T.bg.input, border: `1px solid ${T.border.secondary}`, color: T.text.secondary, fontSize: 13, padding: "8px 12px", width: "100%" }}>
                        <option value="">— nenhuma —</option>
                        {caps.map(c => <option key={c.id} value={c.id}>Célula {String(c.numero).padStart(2, "0")}{c.titulo ? ` — ${c.titulo}` : ""}</option>)}
                      </select>
                    </div>
                  )}

                  <TextArea label="O que acontece (externo)" value={mom.externo} onChange={v => upd(mom.id, "externo", v)} rows={3} placeholder="o evento, o fato, o que a câmara vê..." />
                  <TextArea label="O que registra (interno)" value={mom.interno} onChange={v => upd(mom.id, "interno", v)} rows={3} placeholder="como registra, ou como falha em registrar..." />
                  <TextArea label="Estado do tempo simbólico" value={mom.simbolico} onChange={v => upd(mom.id, "simbolico", v)} rows={2} placeholder="o que acontece com o tempo aqui. como falha." />
                  <TextArea label="Notas" value={mom.notas} onChange={v => upd(mom.id, "notas", v)} rows={2} placeholder="ressonâncias, conexões, questões..." />
                </div>
              </div>
            ) : (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <EmptyMsg msg={momentos.length === 0 ? "Registre o primeiro momento temporal." : "Selecione um momento para editar."} />
              </div>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: DETECTOR DE CONSISTÊNCIA
    // ════════════════════════════════════════════════════════════════
    const AXIOMAS = [
      { id: 1, texto: "Nenhuma resolução narrativa",            descricao: "Nenhum capítulo resolve o estado fundamental da protagonista." },
      { id: 2, texto: "Lucidez não produz libertação",          descricao: "Entender não muda. A inteligência é a própria prisão, não a saída." },
      { id: 3, texto: "Dissociação é condição, não patologia",  descricao: "Não há cura, não há superação, não há arco. É a condição de existência." },
      { id: 4, texto: "Tempo simbólico não acumula sentido",    descricao: "Os dias não geram significado. Acumulam ruína, ou simplesmente nada." },
      { id: 5, texto: "Personagens pressionam, não salvam",     descricao: "Nenhuma relação resolve o estado fundamental da protagonista." },
      { id: 6, texto: "Ausência de arco de superação",          descricao: "Nenhuma aprendizagem produz transformação duradoura ou liberadora." },
      { id: 7, texto: "A linguagem falha e persiste",           descricao: "A palavra trai a percepção — e é tudo que há. Não há outra linguagem disponível." },
      { id: 8, texto: "Presença sem habitação plena",           descricao: "Estar não é habitar. O corpo está; a protagonista, não inteiramente." },
    ];

    const STATUS_AXIOMA = {
      mantido:  { label: "mantido",  cor: T.accent.sage,  simbolo: "●" },
      incerto:  { label: "incerto",  cor: T.accent.gold,  simbolo: "◐" },
      violado:  { label: "violado",  cor: T.accent.rose,  simbolo: "○" },
      nenhum:   { label: "—",        cor: T.text.darker,  simbolo: "·" },
    };

    function CelulaInconsistencias() {
      const caps = useMemo(() => load("estrutura", []), []);
      const [checks, setChecks] = useState(() => load("inconsistencias", {}));
      const [notas, setNotas] = useState(() => load("incons-notas", {}));
      const [salvo, setSalvo] = useState(false);
      const [sel, setSel] = useState(null);

      useEffect(() => {
        save("inconsistencias", checks);
        save("incons-notas", notas);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [checks, notas]);

      const getStatus = (capId, axId) => checks[`${capId}-${axId}`] || "nenhum";
      const cycleStatus = (capId, axId) => {
        const ordem = ["nenhum", "mantido", "incerto", "violado"];
        const atual = getStatus(capId, axId);
        const next = ordem[(ordem.indexOf(atual) + 1) % ordem.length];
        setChecks({ ...checks, [`${capId}-${axId}`]: next });
      };

      const resumo = AXIOMAS.map(ax => ({
        ...ax,
        mantidos: caps.filter(c => getStatus(c.id, ax.id) === "mantido").length,
        incertos: caps.filter(c => getStatus(c.id, ax.id) === "incerto").length,
        violados: caps.filter(c => getStatus(c.id, ax.id) === "violado").length,
      }));

      if (caps.length === 0) {
        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <CelulaHeader sigla="CON" titulo="Detector de Consistência" descricao="Verifica se cada célula mantém os axiomas estruturais de O Entre." cor={T.accent.rose} />
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <EmptyMsg msg="Crie células na Estrutura Capitular para ativar o detector." />
            </div>
          </div>
        );
      }

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <CelulaHeader sigla="CON" titulo="Detector de Consistência"
            descricao="Os axiomas estruturais de O Entre. Cada célula deve manter todos eles. Clique em qualquer célula para alternar: · → ● mantido → ◐ incerto → ○ violado."
            cor={T.accent.rose}
            extra={<SaveIndicator salvo={salvo} />}
          />

          <div style={{ flex: 1, overflowY: "auto", overflowX: "auto" }}>
            {/* Resumo dos axiomas */}
            <div style={{ padding: "24px 48px 0", display: "flex", flexWrap: "wrap", gap: 12, borderBottom: `1px solid ${T.border.primary}` }}>
              {resumo.map(ax => (
                <div key={ax.id} style={{ padding: "12px 16px", background: T.bg.card, border: `1px solid ${T.border.secondary}`, borderRadius: 3, minWidth: 180, flex: "1 1 180px", marginBottom: 16 }}>
                  <div style={{ fontSize: 10, color: T.text.darker, fontFamily: T.font.mono, letterSpacing: 1, marginBottom: 8 }}>AXIOMA {ax.id}</div>
                  <div style={{ fontSize: 12, color: T.text.secondary, marginBottom: 10, lineHeight: 1.5 }}>{ax.texto}</div>
                  <div style={{ display: "flex", gap: 12, fontSize: 11 }}>
                    <span style={{ color: T.accent.sage }}>{ax.mantidos > 0 ? `${ax.mantidos} ●` : ""}</span>
                    <span style={{ color: T.accent.gold }}>{ax.incertos > 0 ? `${ax.incertos} ◐` : ""}</span>
                    <span style={{ color: T.accent.rose }}>{ax.violados > 0 ? `${ax.violados} ○` : ""}</span>
                    {ax.mantidos === 0 && ax.incertos === 0 && ax.violados === 0 && <span style={{ color: T.text.darker }}>não verificado</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* Grid */}
            <div style={{ padding: "32px 48px 60px", overflowX: "auto" }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 20, textTransform: "uppercase", fontFamily: T.font.mono }}>Matriz por célula</div>
              <table style={{ borderCollapse: "collapse", fontSize: 11 }}>
                <thead>
                  <tr>
                    <th style={{ padding: "8px 16px 8px 0", textAlign: "left", fontSize: 10, color: T.text.darker, fontFamily: T.font.mono, fontWeight: 400, letterSpacing: 1, whiteSpace: "nowrap", minWidth: 140 }}>CÉLULA</th>
                    {AXIOMAS.map(ax => (
                      <th key={ax.id} style={{ padding: "8px 6px", textAlign: "center", fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, fontWeight: 400, letterSpacing: 1, minWidth: 40 }}>
                        AX{ax.id}
                      </th>
                    ))}
                    <th style={{ padding: "8px 0 8px 16px", textAlign: "left", fontSize: 10, color: T.text.darker, fontFamily: T.font.mono, fontWeight: 400, letterSpacing: 1, minWidth: 200 }}>NOTA</th>
                  </tr>
                </thead>
                <tbody>
                  {caps.map(c => {
                    const violados = AXIOMAS.filter(ax => getStatus(c.id, ax.id) === "violado").length;
                    return (
                      <tr key={c.id} style={{ borderTop: `1px solid ${T.border.secondary}` }}>
                        <td style={{ padding: "10px 16px 10px 0", whiteSpace: "nowrap" }}>
                          <span style={{ fontSize: 10, color: T.text.darker, fontFamily: T.font.mono, marginRight: 8 }}>{String(c.numero).padStart(2, "0")}</span>
                          <span style={{ fontSize: 12, color: violados > 0 ? T.accent.rose : T.text.dim }}>{c.titulo || "—"}</span>
                          {violados > 0 && <span style={{ marginLeft: 8, fontSize: 9, color: T.accent.rose, fontFamily: T.font.mono }}>{violados}✗</span>}
                        </td>
                        {AXIOMAS.map(ax => {
                          const st = getStatus(c.id, ax.id);
                          const info = STATUS_AXIOMA[st];
                          return (
                            <td key={ax.id} style={{ padding: "10px 6px", textAlign: "center" }}>
                              <button onClick={() => cycleStatus(c.id, ax.id)} title={`${ax.texto}\nAtual: ${info.label}`}
                                style={{ background: "none", border: "none", fontSize: 14, color: info.cor, cursor: "pointer", width: 28, height: 28, borderRadius: 3, transition: "background 0.1s" }}>
                                {info.simbolo}
                              </button>
                            </td>
                          );
                        })}
                        <td style={{ padding: "10px 0 10px 16px" }}>
                          <input type="text" value={notas[c.id] || ""} onChange={e => setNotas({ ...notas, [c.id]: e.target.value })}
                            placeholder="nota sobre esta célula..."
                            style={{ background: "transparent", border: "none", borderBottom: `1px solid ${T.border.secondary}`, color: T.text.dim, fontSize: 12, padding: "2px 0", width: "100%", minWidth: 180 }} />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>

              {/* Legenda */}
              <div style={{ marginTop: 32, display: "flex", gap: 24, fontSize: 12 }}>
                {Object.entries(STATUS_AXIOMA).filter(([k]) => k !== "nenhum").map(([k, v]) => (
                  <div key={k} style={{ display: "flex", alignItems: "center", gap: 8, color: v.cor }}>
                    <span style={{ fontSize: 14 }}>{v.simbolo}</span>
                    <span style={{ fontFamily: T.font.mono, letterSpacing: 1, fontSize: 11 }}>{v.label}</span>
                  </div>
                ))}
                <div style={{ display: "flex", alignItems: "center", gap: 8, color: T.text.darker }}>
                  <span style={{ fontSize: 14 }}>·</span>
                  <span style={{ fontFamily: T.font.mono, letterSpacing: 1, fontSize: 11 }}>não verificado</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: MÉTRICAS DE VOZ
    // ════════════════════════════════════════════════════════════════
    const MARCADORES_CORPO = ["mão", "mãos", "pé", "pés", "pele", "corpo", "respiração", "respirar", "olho", "olhos", "peito", "garganta", "joelho", "dedo", "dedos", "rosto", "boca", "ouvido", "ombro", "costas", "ventre", "estômago"];
    const MARCADORES_DISSO = ["como se", "parecia", "parece", "não era", "não é que", "distante", "ausente", "outro lugar", "não estava", "não estava lá", "longe de si", "ao lado de", "sem que ela", "enquanto ela", "ela notou", "ela percebeu que já"];
    const MARCADORES_PRECEP = ["antes que", "antes de nomear", "antes de saber", "antes de entender", "o corpo sabia", "já sabia antes", "sem saber por quê", "sem entender"];

    function analisarTexto(texto) {
      if (!texto.trim()) return null;
      const palavras = texto.trim().split(/\s+/).filter(w => w.length > 0).length;
      const frases = texto.split(/[.!?]+/).filter(s => s.trim().length > 2).length;
      const avgFrase = frases > 0 ? Math.round((palavras / frases) * 10) / 10 : 0;
      const txt = texto.toLowerCase();
      const countMarcador = (lista) => lista.reduce((acc, m) => {
        const re = new RegExp(m, "gi");
        return acc + (texto.match(re) || []).length;
      }, 0);
      return {
        palavras, frases, avgFrase,
        corpo: countMarcador(MARCADORES_CORPO),
        disso: countMarcador(MARCADORES_DISSO),
        percep: countMarcador(MARCADORES_PRECEP),
      };
    }

    function BarraMetrica({ label, valor, max, cor, unidade = "" }) {
      const pct = max > 0 ? Math.min((valor / max) * 100, 100) : 0;
      return (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: T.text.dim, fontFamily: T.font.mono, letterSpacing: 1 }}>{label}</span>
            <span style={{ fontSize: 12, color: cor, fontFamily: T.font.mono }}>{valor}{unidade}</span>
          </div>
          <div style={{ height: 3, background: T.border.secondary, borderRadius: 2 }}>
            <div style={{ width: `${pct}%`, height: "100%", background: cor, borderRadius: 2, transition: "width 0.4s" }} />
          </div>
        </div>
      );
    }

    function CelulaMetricas() {
      const [texto, setTexto] = useState("");
      const [log, setLog] = useState(() => load("metricas-log", []));
      const [capSel, setCapSel] = useState("");
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("metricas-log", log);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [log]);

      const caps = useMemo(() => load("estrutura", []), []);
      const analise = useMemo(() => analisarTexto(texto), [texto]);

      const salvarAnalise = () => {
        if (!analise) return;
        const cap = caps.find(c => c.id === parseInt(capSel));
        const entrada = {
          id: Date.now(),
          capId: capSel ? parseInt(capSel) : null,
          capLabel: cap ? `Célula ${String(cap.numero).padStart(2, "0")}${cap.titulo ? ` — ${cap.titulo}` : ""}` : "Sem célula",
          data: new Date().toLocaleDateString("pt-BR"),
          ...analise,
          textoParcial: texto.slice(0, 80) + (texto.length > 80 ? "..." : ""),
        };
        setLog([entrada, ...log]);
        setTexto("");
        setCapSel("");
      };

      const maxPalavras = Math.max(...log.map(e => e.palavras), 1);

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <CelulaHeader sigla="VOZ" titulo="Métricas de Voz"
            descricao="Cole o texto de uma célula para análise automática. O sistema detecta marcadores de presença corporal, dissociação e percepção pré-verbal. Os dados são salvos por célula."
            cor={T.accent.purple}
            extra={<SaveIndicator salvo={salvo} />}
          />

          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            {/* Área de análise */}
            <div style={{ flex: 1, padding: "36px 48px", overflowY: "auto", borderRight: `1px solid ${T.border.primary}` }}>
              {caps.length > 0 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>Associar à célula</div>
                  <select value={capSel} onChange={e => setCapSel(e.target.value)}
                    style={{ background: T.bg.input, border: `1px solid ${T.border.secondary}`, color: T.text.secondary, fontSize: 13, padding: "8px 12px", width: "100%" }}>
                    <option value="">— sem associação —</option>
                    {caps.map(c => <option key={c.id} value={c.id}>Célula {String(c.numero).padStart(2, "0")}{c.titulo ? ` — ${c.titulo}` : ""}</option>)}
                  </select>
                </div>
              )}

              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>Cole o texto aqui</div>
              <textarea value={texto} onChange={e => setTexto(e.target.value)} rows={12} placeholder="Cole o texto da célula para análise..."
                style={{ width: "100%", background: T.bg.card, border: `1px solid ${T.border.primary}`, color: T.text.secondary, fontSize: 13, lineHeight: 1.8, padding: "16px", borderRadius: 3, resize: "vertical" }} />

              {analise && (
                <div style={{ marginTop: 28 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 20, textTransform: "uppercase", fontFamily: T.font.mono }}>Análise</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginBottom: 28 }}>
                    {[
                      { label: "Palavras", valor: analise.palavras, cor: T.text.secondary },
                      { label: "Frases", valor: analise.frases, cor: T.text.secondary },
                      { label: "Méd. palavras/frase", valor: analise.avgFrase, cor: T.text.secondary },
                    ].map(m => (
                      <div key={m.label} style={{ background: T.bg.card, border: `1px solid ${T.border.secondary}`, padding: "16px 20px", borderRadius: 3 }}>
                        <div style={{ fontSize: 10, letterSpacing: 2, color: T.text.darker, fontFamily: T.font.mono, marginBottom: 8 }}>{m.label}</div>
                        <div style={{ fontSize: 24, color: m.cor, fontFamily: T.font.mono }}>{m.valor}</div>
                      </div>
                    ))}
                  </div>
                  <BarraMetrica label="MARCADORES CORPORAIS" valor={analise.corpo} max={Math.max(analise.corpo, analise.disso, analise.percep, 5)} cor={T.accent.amber} />
                  <BarraMetrica label="MARCADORES DE DISSOCIAÇÃO" valor={analise.disso} max={Math.max(analise.corpo, analise.disso, analise.percep, 5)} cor={T.accent.slate} />
                  <BarraMetrica label="PERCEPÇÃO PRÉ-VERBAL" valor={analise.percep} max={Math.max(analise.corpo, analise.disso, analise.percep, 5)} cor={T.accent.purple} />

                  <div style={{ marginTop: 28 }}>
                    <button onClick={salvarAnalise} style={{ padding: "10px 24px", background: T.accent.purple + "22", border: `1px solid ${T.accent.purple}55`, color: T.accent.purple, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>
                      Salvar no histórico
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* Histórico */}
            <div style={{ width: 340, overflowY: "auto", flexShrink: 0 }}>
              <div style={{ padding: "24px 24px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
                <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, textTransform: "uppercase", fontFamily: T.font.mono }}>Histórico por célula</div>
              </div>
              {log.length === 0 && <EmptyMsg msg="Nenhuma análise salva ainda." />}
              {log.map((e, i) => (
                <div key={e.id} style={{ padding: "16px 20px", borderBottom: `1px solid ${T.border.secondary}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 11, color: T.accent.purple, fontFamily: T.font.mono }}>{e.capLabel}</span>
                    <span style={{ fontSize: 10, color: T.text.darker }}>{e.data}</span>
                  </div>
                  <div style={{ fontSize: 11, color: T.text.dim, fontStyle: "italic", marginBottom: 10, lineHeight: 1.5 }}>{e.textoParcial}</div>
                  <div style={{ display: "flex", gap: 16, fontSize: 11, fontFamily: T.font.mono }}>
                    <span style={{ color: T.text.darker }}>{e.palavras}p</span>
                    <span style={{ color: T.accent.amber }}>{e.corpo}corp</span>
                    <span style={{ color: T.accent.slate }}>{e.disso}diss</span>
                    <span style={{ color: T.accent.purple }}>{e.percep}prev</span>
                  </div>
                  {/* Miniatura visual */}
                  <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
                    {[
                      { v: e.corpo, cor: T.accent.amber, max: 10 },
                      { v: e.disso, cor: T.accent.slate, max: 10 },
                      { v: e.percep, cor: T.accent.purple, max: 10 },
                    ].map((b, bi) => (
                      <div key={bi} style={{ flex: 1, height: 3, background: T.border.secondary, borderRadius: 2 }}>
                        <div style={{ width: `${Math.min((b.v / b.max) * 100, 100)}%`, height: "100%", background: b.cor, borderRadius: 2 }} />
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {log.length > 0 && (
                <div style={{ padding: "12px 20px" }}>
                  <button onClick={() => { if (window.confirm("Limpar todo o histórico?")) setLog([]); }}
                    style={{ background: "none", border: "none", color: T.text.darker, fontSize: 10, letterSpacing: 1, fontFamily: T.font.mono, textTransform: "uppercase" }}>
                    limpar histórico
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: MAPA DE STAKES
    // ════════════════════════════════════════════════════════════════
    const TIPOS_STAKES = [
      { id: "temporal",    label: "Temporal",    descricao: "Capacidade de distinguir momentos",              cor: T.accent.amber  },
      { id: "corporal",    label: "Corporal",    descricao: "Registro sensorial como território de saber",    cor: T.accent.sage   },
      { id: "linguistico", label: "Linguístico", descricao: "A palavra que tenta aproximar a experiência",    cor: T.accent.slate  },
      { id: "relacional",  label: "Relacional",  descricao: "Possibilidade de contato sem fusão",             cor: T.accent.rose   },
      { id: "ontologico",  label: "Ontológico",  descricao: "Existência de uma 'ela mesma' para coincidir",  cor: T.accent.purple },
    ];

    function getHeatColor(v) {
      if (v === 0) return "transparent";
      const cores = ["", T.accent.sage + "40", T.accent.amber + "55", T.accent.gold + "77", T.accent.rose + "88", T.accent.rose];
      return cores[Math.min(v, 5)];
    }

    function CelulaStakes() {
      const caps = useMemo(() => load("estrutura", []), []);
      const [stakes, setStakes] = useState(() => load("stakes", {}));
      const [notas, setNotas] = useState(() => load("stakes-notas", {}));
      const [salvo, setSalvo] = useState(false);
      const [hover, setHover] = useState(null);

      useEffect(() => {
        save("stakes", stakes);
        save("stakes-notas", notas);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [stakes, notas]);

      const getVal = (capId, stakeId) => stakes[`${capId}-${stakeId}`] || 0;
      const cycleVal = (capId, stakeId) => {
        const atual = getVal(capId, stakeId);
        setStakes({ ...stakes, [`${capId}-${stakeId}`]: (atual + 1) % 6 });
      };

      if (caps.length === 0) {
        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <CelulaHeader sigla="STK" titulo="Mapa de Stakes" descricao="Stakes ontológicos por célula. Não dramáticos — o que está estruturalmente em jogo." cor={T.accent.warm} />
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <EmptyMsg msg="Crie células na Estrutura Capitular para ativar o mapa." />
            </div>
          </div>
        );
      }

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <CelulaHeader sigla="STK" titulo="Mapa de Stakes Ontológicos"
            descricao="O que está em jogo em cada célula — não stakes dramáticos, mas ontológicos. Clique em cada célula para aumentar a intensidade (0–5). Clique em 5 para zerar."
            cor={T.accent.warm}
            extra={<SaveIndicator salvo={salvo} />}
          />

          <div style={{ flex: 1, overflowY: "auto", overflowX: "auto", padding: "32px 48px 60px" }}>
            {/* Legenda dos tipos */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 32 }}>
              {TIPOS_STAKES.map(ts => (
                <div key={ts.id} style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ width: 3, height: 40, background: ts.cor, borderRadius: 2, flexShrink: 0, marginTop: 2 }} />
                  <div>
                    <div style={{ fontSize: 11, color: ts.cor, fontFamily: T.font.mono, letterSpacing: 1 }}>{ts.label}</div>
                    <div style={{ fontSize: 11, color: T.text.darker, marginTop: 2 }}>{ts.descricao}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Grid */}
            <div style={{ overflowX: "auto" }}>
              <table style={{ borderCollapse: "collapse" }}>
                <thead>
                  <tr>
                    <th style={{ padding: "6px 16px 6px 0", textAlign: "left", fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, fontWeight: 400, letterSpacing: 1.5, minWidth: 140, textTransform: "uppercase" }}>Célula</th>
                    {TIPOS_STAKES.map(ts => (
                      <th key={ts.id} style={{ padding: "6px 8px", textAlign: "center", fontSize: 9, color: ts.cor, fontFamily: T.font.mono, fontWeight: 400, letterSpacing: 1.5, minWidth: 80, textTransform: "uppercase" }}>{ts.label}</th>
                    ))}
                    <th style={{ padding: "6px 0 6px 20px", textAlign: "left", fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, fontWeight: 400, letterSpacing: 1.5, minWidth: 200, textTransform: "uppercase" }}>Nota</th>
                  </tr>
                </thead>
                <tbody>
                  {caps.map(c => {
                    const totalStake = TIPOS_STAKES.reduce((a, ts) => a + getVal(c.id, ts.id), 0);
                    return (
                      <tr key={c.id} style={{ borderTop: `1px solid ${T.border.secondary}` }}>
                        <td style={{ padding: "10px 16px 10px 0", whiteSpace: "nowrap" }}>
                          <span style={{ fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, marginRight: 8 }}>{String(c.numero).padStart(2, "0")}</span>
                          <span style={{ fontSize: 13, color: T.text.dim }}>{c.titulo || "—"}</span>
                        </td>
                        {TIPOS_STAKES.map(ts => {
                          const v = getVal(c.id, ts.id);
                          const key = `${c.id}-${ts.id}`;
                          return (
                            <td key={ts.id} style={{ padding: "10px 8px", textAlign: "center" }}>
                              <button onClick={() => cycleVal(c.id, ts.id)} onMouseEnter={() => setHover(key)} onMouseLeave={() => setHover(null)}
                                title={`${ts.label}: ${v}/5\n${ts.descricao}`}
                                style={{ width: 48, height: 32, background: hover === key ? ts.cor + "22" : getHeatColor(v), border: `1px solid ${v > 0 ? ts.cor + "44" : T.border.secondary}`, borderRadius: 3, color: v > 0 ? ts.cor : T.text.darker, fontSize: 12, fontFamily: T.font.mono, cursor: "pointer", transition: "all 0.15s" }}>
                                {v > 0 ? v : "·"}
                              </button>
                            </td>
                          );
                        })}
                        <td style={{ padding: "10px 0 10px 20px" }}>
                          <input type="text" value={notas[c.id] || ""} onChange={e => setNotas({ ...notas, [c.id]: e.target.value })}
                            placeholder="o que está em jogo aqui..."
                            style={{ background: "transparent", border: "none", borderBottom: `1px solid ${T.border.secondary}`, color: T.text.dim, fontSize: 12, padding: "2px 0", width: "100%", minWidth: 180 }} />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* Perfil de stakes por tipo */}
            <div style={{ marginTop: 48 }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 20, textTransform: "uppercase", fontFamily: T.font.mono }}>Intensidade acumulada por tipo</div>
              {TIPOS_STAKES.map(ts => {
                const total = caps.reduce((a, c) => a + getVal(c.id, ts.id), 0);
                const max = caps.length * 5;
                return <BarraMetrica key={ts.id} label={ts.label.toUpperCase()} valor={total} max={max || 1} cor={ts.cor} unidade={`/${max}`} />;
              })}
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // UTILITÁRIO: LISTA DE ENTIDADES (componente genérico reutilizável)
    // ════════════════════════════════════════════════════════════════
    function ListaEntidade({ sigla, titulo, descricao, cor, storageKey, campos, tipos, emptyLabel }) {
      const [items, setItems] = useState(() => load(storageKey, []));
      const [sel, setSel] = useState(null);
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save(storageKey, items);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [items]);

      const addItem = () => {
        const defaults = { id: Date.now(), nome: "", tipo: tipos?.[0]?.v || "" };
        campos.forEach(c => { defaults[c.k] = ""; });
        setItems(prev => { const n = [...prev, defaults]; return n; });
        setSel(defaults.id);
      };
      const upd = (id, k, v) => setItems(items.map(i => i.id === id ? { ...i, [k]: v } : i));
      const del = (id) => {
        const r = items.filter(i => i.id !== id);
        setItems(r);
        setSel(r[0]?.id || null);
      };
      const item = items.find(i => i.id === sel);

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <CelulaHeader sigla={sigla} titulo={titulo} descricao={descricao} cor={cor} extra={<SaveIndicator salvo={salvo} />} />
          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            <div style={{ width: 236, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", background: T.bg.nav, flexShrink: 0 }}>
              <div style={{ padding: "18px 16px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
                <button onClick={addItem} style={{ width: "100%", padding: "8px 12px", background: cor + "18", border: `1px solid ${cor}44`, color: cor, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>
                  + {emptyLabel || "Adicionar"}
                </button>
              </div>
              <div style={{ flex: 1, overflowY: "auto" }}>
                {items.length === 0 && <EmptyMsg msg="Nenhum item ainda." />}
                {items.map(it => (
                  <button key={it.id} onClick={() => setSel(it.id)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "12px 16px", background: sel === it.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === it.id ? cor : "transparent"}`, textAlign: "left" }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: sel === it.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.nome || "—"}</div>
                      {tipos && it.tipo && <div style={{ fontSize: 10, color: cor, marginTop: 3, fontFamily: T.font.mono }}>{it.tipo}</div>}
                    </div>
                  </button>
                ))}
              </div>
            </div>
            {item ? (
              <div style={{ flex: 1, overflowY: "auto", padding: "36px 48px 60px" }}>
                <div style={{ maxWidth: 660 }}>
                  <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
                    <span style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, fontFamily: T.font.mono }}>{sigla}</span>
                    <button onClick={() => del(item.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>remover</button>
                  </div>
                  <TextInput label="Nome" value={item.nome} onChange={v => upd(item.id, "nome", v)} placeholder="nome ou designação" size={20} />
                  {tipos && (
                    <div style={{ marginBottom: 26 }}>
                      <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Tipo</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                        {tipos.map(t => (
                          <button key={t.v} onClick={() => upd(item.id, "tipo", t.v)} style={{ padding: "5px 12px", border: `1px solid ${item.tipo === t.v ? cor : T.border.secondary}`, background: item.tipo === t.v ? cor + "18" : "transparent", color: item.tipo === t.v ? cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>
                            {t.l}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                  {campos.map(f => (
                    f.rows
                      ? <TextArea key={f.k} label={f.l} value={item[f.k] || ""} onChange={v => upd(item.id, f.k, v)} rows={f.rows} placeholder={f.p || ""} />
                      : <TextInput key={f.k} label={f.l} value={item[f.k] || ""} onChange={v => upd(item.id, f.k, v)} placeholder={f.p || ""} />
                  ))}
                </div>
              </div>
            ) : (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <EmptyMsg msg={items.length === 0 ? "Adicione o primeiro item." : "Selecione para editar."} />
              </div>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: ARCOS / TEMAS
    // ════════════════════════════════════════════════════════════════
    function CelulaArcos() {
      const [arcos, setArcos] = useState(() => load("arcos", []));
      const [sel, setSel] = useState(null);
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("arcos", arcos);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [arcos]);

      const caps = useMemo(() => load("estrutura", []), []);
      const pers = useMemo(() => load("personagens", PERS_DEFAULT), []);

      const TIPOS_ARCO = [
        { v: "tematico", l: "Temático", cor: T.accent.amber },
        { v: "relacional", l: "Relacional", cor: T.accent.slate },
        { v: "temporal", l: "Temporal", cor: T.accent.gold },
        { v: "existencial", l: "Existencial", cor: T.accent.purple },
        { v: "de-voz", l: "De Voz", cor: T.accent.rose },
        { v: "estrutural", l: "Estrutural", cor: T.accent.sage },
      ];
      const ESTADOS = [{ v: "latente", l: "Latente" }, { v: "ativo", l: "Ativo" }, { v: "suspenso", l: "Suspenso" }, { v: "sem-fechamento", l: "Sem fechamento" }];
      const COR_ARC = "#6B7B6B";

      const addArco = () => {
        const novo = { id: Date.now(), nome: "", tipo: "tematico", descricao: "", estado: "latente", perIds: [], capIds: [], notas: "" };
        setArcos([...arcos, novo]);
        setSel(novo.id);
      };
      const upd = (id, k, v) => setArcos(arcos.map(a => a.id === id ? { ...a, [k]: v } : a));
      const del = (id) => { const r = arcos.filter(a => a.id !== id); setArcos(r); setSel(r[0]?.id || null); };
      const toggleArr = (id, k, val) => {
        const a = arcos.find(a => a.id === id);
        const arr = a?.[k] || [];
        upd(id, k, arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);
      };

      const arco = arcos.find(a => a.id === sel);
      const tipoAtual = TIPOS_ARCO.find(t => t.v === arco?.tipo);

      return (
        <div style={{ display: "flex", height: "100%" }}>
          <div style={{ width: 236, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", background: T.bg.nav, flexShrink: 0 }}>
            <div style={{ padding: "18px 16px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>ARC · fios</div>
              <button onClick={addArco} style={{ width: "100%", padding: "8px 12px", background: COR_ARC + "18", border: `1px solid ${COR_ARC}44`, color: COR_ARC, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>+ Novo Arco</button>
            </div>
            <div style={{ flex: 1, overflowY: "auto" }}>
              {arcos.length === 0 && <EmptyMsg msg="Nenhum arco / tema mapeado." />}
              {arcos.map(a => {
                const t = TIPOS_ARCO.find(t => t.v === a.tipo);
                return (
                  <button key={a.id} onClick={() => setSel(a.id)} style={{ display: "flex", flexDirection: "column", gap: 3, width: "100%", padding: "12px 16px", background: sel === a.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === a.id ? (t?.cor || COR_ARC) : "transparent"}`, textAlign: "left" }}>
                    <div style={{ fontSize: 13, color: sel === a.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.nome || "—"}</div>
                    <div style={{ fontSize: 10, color: t?.cor || COR_ARC, fontFamily: T.font.mono }}>{t?.l || ""} · {a.estado}</div>
                  </button>
                );
              })}
            </div>
            <div style={{ padding: "12px 16px", borderTop: `1px solid ${T.border.secondary}` }}><SaveIndicator salvo={salvo} /></div>
          </div>

          {arco ? (
            <div style={{ flex: 1, overflowY: "auto", padding: "36px 48px 60px" }}>
              <div style={{ maxWidth: 660 }}>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
                  <span style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, fontFamily: T.font.mono }}>ARCO / TEMA</span>
                  <button onClick={() => del(arco.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>remover</button>
                </div>
                <TextInput label="Nome" value={arco.nome} onChange={v => upd(arco.id, "nome", v)} placeholder="o fio que percorre a obra..." size={20} />
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Tipo</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {TIPOS_ARCO.map(t => <button key={t.v} onClick={() => upd(arco.id, "tipo", t.v)} style={{ padding: "5px 12px", border: `1px solid ${arco.tipo === t.v ? t.cor : T.border.secondary}`, background: arco.tipo === t.v ? t.cor + "18" : "transparent", color: arco.tipo === t.v ? t.cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>{t.l}</button>)}
                  </div>
                </div>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Estado</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {ESTADOS.map(e => <button key={e.v} onClick={() => upd(arco.id, "estado", e.v)} style={{ padding: "5px 12px", border: `1px solid ${arco.estado === e.v ? COR_ARC : T.border.secondary}`, background: arco.estado === e.v ? COR_ARC + "18" : "transparent", color: arco.estado === e.v ? COR_ARC : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>{e.l}</button>)}
                  </div>
                </div>
                <TextArea label="Descrição" value={arco.descricao} onChange={v => upd(arco.id, "descricao", v)} rows={3} placeholder="o que este fio carrega, como atravessa a obra..." />
                {pers.length > 0 && (
                  <div style={{ marginBottom: 26 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Personagens envolvidos</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {pers.map(p => { const a = arco.perIds?.includes(p.id); return <button key={p.id} onClick={() => toggleArr(arco.id, "perIds", p.id)} style={{ padding: "5px 12px", border: `1px solid ${a ? p.cor : T.border.secondary}`, background: a ? p.cor + "18" : "transparent", color: a ? p.cor : T.text.darker, fontSize: 10, letterSpacing: 1, fontFamily: T.font.mono, borderRadius: 2 }}>{p.nome}</button>; })}
                    </div>
                  </div>
                )}
                {caps.length > 0 && (
                  <div style={{ marginBottom: 26 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Células abrangidas</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {caps.map(c => { const a = arco.capIds?.includes(c.id); const ms = MICROESTADOS[c.microestado]; return <button key={c.id} onClick={() => toggleArr(arco.id, "capIds", c.id)} style={{ padding: "5px 12px", border: `1px solid ${a ? ms.cor : T.border.secondary}`, background: a ? ms.cor + "18" : "transparent", color: a ? ms.cor : T.text.darker, fontSize: 10, letterSpacing: 1, fontFamily: T.font.mono, borderRadius: 2 }}>{String(c.numero).padStart(2, "0")}</button>; })}
                    </div>
                  </div>
                )}
                <TextArea label="Notas" value={arco.notas} onChange={v => upd(arco.id, "notas", v)} rows={3} placeholder="como este tema se manifesta, questões em aberto..." />
              </div>
            </div>
          ) : (
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <EmptyMsg msg={arcos.length === 0 ? "Mapeie o primeiro fio temático da obra." : "Selecione um arco para editar."} />
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: RELACIONAMENTOS
    // ════════════════════════════════════════════════════════════════
    function CelulaRelacionamentos() {
      const [rels, setRels] = useState(() => load("relacionamentos", []));
      const [sel, setSel] = useState(null);
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("relacionamentos", rels);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [rels]);

      const pers = useMemo(() => load("personagens", PERS_DEFAULT), []);
      const caps = useMemo(() => load("estrutura", []), []);

      const TIPOS_REL = [
        { v: "pressao", l: "Pressão", cor: T.accent.rose },
        { v: "espelho", l: "Espelho", cor: T.accent.slate },
        { v: "contraste", l: "Contraste", cor: T.accent.gold },
        { v: "ausencia", l: "Ausência", cor: T.text.darker },
        { v: "ruptura", l: "Ruptura", cor: T.accent.amber },
        { v: "satelite", l: "Satélite", cor: T.accent.warm },
      ];

      const COR_REL = "#8B6B7B";
      const addRel = () => {
        const novo = { id: Date.now(), perA: "", perB: "", tipo: "pressao", descricao: "", dinamica: "", tentativa_a: "", tentativa_b: "", capIds: [], notas: "" };
        setRels([...rels, novo]);
        setSel(novo.id);
      };
      const upd = (id, k, v) => setRels(rels.map(r => r.id === id ? { ...r, [k]: v } : r));
      const del = (id) => { const r = rels.filter(r => r.id !== id); setRels(r); setSel(r[0]?.id || null); };
      const toggleCap = (id, capId) => {
        const rel = rels.find(r => r.id === id);
        const arr = rel?.capIds || [];
        upd(id, "capIds", arr.includes(capId) ? arr.filter(x => x !== capId) : [...arr, capId]);
      };

      const rel = rels.find(r => r.id === sel);
      const tipoRel = TIPOS_REL.find(t => t.v === rel?.tipo);
      const corRel = tipoRel?.cor || COR_REL;
      const getPer = (id) => pers.find(p => p.id === parseInt(id));

      return (
        <div style={{ display: "flex", height: "100%" }}>
          <div style={{ width: 236, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", background: T.bg.nav, flexShrink: 0 }}>
            <div style={{ padding: "18px 16px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>REL · pares</div>
              <button onClick={addRel} style={{ width: "100%", padding: "8px 12px", background: COR_REL + "18", border: `1px solid ${COR_REL}44`, color: COR_REL, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>+ Nova Relação</button>
            </div>
            <div style={{ flex: 1, overflowY: "auto" }}>
              {rels.length === 0 && <EmptyMsg msg="Nenhum relacionamento mapeado." />}
              {rels.map(r => {
                const t = TIPOS_REL.find(t => t.v === r.tipo);
                const pA = getPer(r.perA);
                const pB = getPer(r.perB);
                return (
                  <button key={r.id} onClick={() => setSel(r.id)} style={{ display: "flex", flexDirection: "column", gap: 4, width: "100%", padding: "12px 16px", background: sel === r.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === r.id ? (t?.cor || COR_REL) : "transparent"}`, textAlign: "left" }}>
                    <div style={{ fontSize: 12, color: sel === r.id ? T.text.primary : T.text.dim }}>{pA?.nome || "?"} — {pB?.nome || "?"}</div>
                    <div style={{ fontSize: 10, color: t?.cor || COR_REL, fontFamily: T.font.mono }}>{t?.l || r.tipo}</div>
                  </button>
                );
              })}
            </div>
            <div style={{ padding: "12px 16px", borderTop: `1px solid ${T.border.secondary}` }}><SaveIndicator salvo={salvo} /></div>
          </div>

          {rel ? (
            <div style={{ flex: 1, overflowY: "auto", padding: "36px 48px 60px" }}>
              <div style={{ maxWidth: 660 }}>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
                  <span style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, fontFamily: T.font.mono }}>RELACIONAMENTO</span>
                  <button onClick={() => del(rel.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>remover</button>
                </div>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Par relacional</div>
                  <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                    <select value={rel.perA} onChange={e => upd(rel.id, "perA", e.target.value)} style={{ flex: 1, background: T.bg.input, border: `1px solid ${T.border.secondary}`, color: T.text.secondary, fontSize: 13, padding: "8px 12px" }}>
                      <option value="">— personagem A —</option>
                      {pers.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                    </select>
                    <span style={{ color: T.text.darker, fontFamily: T.font.mono }}>—</span>
                    <select value={rel.perB} onChange={e => upd(rel.id, "perB", e.target.value)} style={{ flex: 1, background: T.bg.input, border: `1px solid ${T.border.secondary}`, color: T.text.secondary, fontSize: 13, padding: "8px 12px" }}>
                      <option value="">— personagem B —</option>
                      {pers.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Tipo de relação</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {TIPOS_REL.map(t => <button key={t.v} onClick={() => upd(rel.id, "tipo", t.v)} style={{ padding: "5px 12px", border: `1px solid ${rel.tipo === t.v ? t.cor : T.border.secondary}`, background: rel.tipo === t.v ? t.cor + "18" : "transparent", color: rel.tipo === t.v ? t.cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>{t.l}</button>)}
                  </div>
                </div>
                <TextArea label="Dinâmica" value={rel.dinamica} onChange={v => upd(rel.id, "dinamica", v)} rows={3} placeholder="como esta relação opera. o que move, o que trava, o que pressiona sem resolver..." />
                <TextArea label={`O que ${getPer(rel.perA)?.nome || "Personagem A"} tenta`} value={rel.tentativa_a} onChange={v => upd(rel.id, "tentativa_a", v)} rows={2} placeholder="o que este personagem quer desta relação, mesmo sem saber..." />
                <TextArea label={`O que ${getPer(rel.perB)?.nome || "Personagem B"} tenta`} value={rel.tentativa_b} onChange={v => upd(rel.id, "tentativa_b", v)} rows={2} placeholder="" />
                {caps.length > 0 && (
                  <div style={{ marginBottom: 26 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Aparece nas células</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {caps.map(c => { const a = rel.capIds?.includes(c.id); return <button key={c.id} onClick={() => toggleCap(rel.id, c.id)} style={{ padding: "5px 12px", border: `1px solid ${a ? corRel : T.border.secondary}`, background: a ? corRel + "18" : "transparent", color: a ? corRel : T.text.darker, fontSize: 10, letterSpacing: 1, fontFamily: T.font.mono, borderRadius: 2 }}>{String(c.numero).padStart(2, "0")}</button>; })}
                    </div>
                  </div>
                )}
                <TextArea label="Notas" value={rel.notas} onChange={v => upd(rel.id, "notas", v)} rows={2} placeholder="" />
              </div>
            </div>
          ) : (
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <EmptyMsg msg={rels.length === 0 ? "Mapeie o primeiro relacionamento." : "Selecione uma relação para editar."} />
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // CÉLULA: SISTEMAS SIMBÓLICOS (adaptado de "Magia" para ficção literária)
