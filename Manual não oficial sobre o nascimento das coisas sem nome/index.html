    function CelulaSimbolico() {
      return <ListaEntidade
        sigla="SIM" titulo="Sistemas Simbólicos" cor="#7B8B6B" storageKey="simbolico" emptyLabel="Novo Sistema"
        descricao="As regras invisíveis que governam O Entre. A lógica do tempo que falhou. A linguagem que trai. A presença sem habitação. Sistemas que não são explicados — apenas operados."
        tipos={[{ v: "temporal", l: "Temporal" }, { v: "linguistico", l: "Linguístico" }, { v: "corporal", l: "Corporal" }, { v: "relacional", l: "Relacional" }, { v: "perceptivo", l: "Perceptivo" }, { v: "ontologico", l: "Ontológico" }]}
        campos={[
          { k: "como_funciona", l: "Como funciona", rows: 3, p: "a lógica interna. as regras não escritas. o que organiza sem se revelar." },
          { k: "manifestacoes", l: "Como se manifesta", rows: 3, p: "onde aparece na narrativa. exemplos concretos em células específicas." },
          { k: "excecoes", l: "Exceções / limites", rows: 2, p: "quando e como se interrompe brevemente. sem resolução — apenas pausa." },
          { k: "notas", l: "Notas", rows: 2, p: "conexões com referências teóricas, questões..." },
        ]}
      />;

      { id: 2, nome: "Espaço Literário (Blanchot)", tipo: "poetica", principios: "A literatura como espaço de impossibilidade — onde a experiência que não cabe na linguagem é precisamente o que a literatura tenta dizer.", manifesta: "O projeto inteiro: dar linguagem ao que não tem linguagem. A escrita de O Entre como ato de aproximação do que não se pode dizer.", autores: "Maurice Blanchot — O Espaço Literário.", conexao: "Define o projeto formal: a escrita não como representação, mas como tentativa impossível.", notas: "" },

      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("filosofias", fils);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [fils]);

      const TIPOS_FIL = [{ v: "filosofia", l: "Filosofia" }, { v: "poetica", l: "Poética" }, { v: "teoria", l: "Teoria" }, { v: "etica", l: "Ética" }, { v: "politica", l: "Política" }];

      const addFil = () => {
        const novo = { id: Date.now(), nome: "", tipo: "filosofia", principios: "", manifesta: "", autores: "", conexao: "", notas: "" };
        setFils([...fils, novo]);
        setSel(novo.id);
      };
      const upd = (id, k, v) => setFils(fils.map(f => f.id === id ? { ...f, [k]: v } : f));
      const del = (id) => { const r = fils.filter(f => f.id !== id); setFils(r); setSel(r[0]?.id || null); };
      const fil = fils.find(f => f.id === sel);

      return (
        <div style={{ display: "flex", height: "100%" }}>

            <div style={{ padding: "18px 16px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 10, textTransform: "uppercase", fontFamily: T.font.mono }}>FIL · fundamentos</div>
              <button onClick={addFil} style={{ width: "100%", padding: "8px 12px", background: COR_FIL + "18", border: `1px solid ${COR_FIL}44`, color: COR_FIL, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2 }}>+ Nova Filosofia</button>

            <div style={{ flex: 1, overflowY: "auto" }}>
              {fils.map(f => (

    // CÉLULA: ENCICLOPÉDIA
    // ════════════════════════════════════════════════════════════════
    function CelulaEnciclopedia() {
      const [entradas, setEntradas] = useState(() => load("enciclopedia", []));
      const [sel, setSel] = useState(null);
      const [busca, setBusca] = useState("");
      const [catFiltro, setCatFiltro] = useState("todos");
      const [salvo, setSalvo] = useState(false);

      useEffect(() => {
        save("enciclopedia", entradas);
        setSalvo(true);
        const t = setTimeout(() => setSalvo(false), 1500);
        return () => clearTimeout(t);
      }, [entradas]);

      const CATS = [
        { v: "todos", l: "Todos", cor: T.text.dim },
        { v: "conceito", l: "Conceito", cor: T.accent.amber },
        { v: "evento", l: "Evento", cor: T.accent.sage },
        { v: "elemento", l: "Elemento", cor: T.accent.slate },
        { v: "tecnica", l: "Técnica", cor: T.accent.purple },
        { v: "nota-autoral", l: "Nota autoral", cor: T.accent.rose },
        { v: "definicao", l: "Definição", cor: "#8B8B6B" },
      ];

      const COR_ENC = "#8B7B6B";
      const addEntrada = () => {
        const novo = { id: Date.now(), titulo: "", categoria: "conceito", conteudo: "", tags: "", cruzamentos: "", notas: "" };
        setEntradas([...entradas, novo]);
        setSel(novo.id);
      };
      const upd = (id, k, v) => setEntradas(entradas.map(e => e.id === id ? { ...e, [k]: v } : e));
      const del = (id) => { const r = entradas.filter(e => e.id !== id); setEntradas(r); setSel(r[0]?.id || null); };

      const filtradas = entradas.filter(e => {
        const matchCat = catFiltro === "todos" || e.categoria === catFiltro;
        const matchBusca = !busca || [e.titulo, e.conteudo, e.tags].join(" ").toLowerCase().includes(busca.toLowerCase());
        return matchCat && matchBusca;
      });

      const entrada = entradas.find(e => e.id === sel);

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <CelulaHeader sigla="ENC" titulo="Enciclopédia"
            descricao="Repositório de conceitos, eventos, técnicas e notas autorais. A memória técnica e criativa de O Entre — searchable, categorizada, sempre acessível."
            cor={COR_ENC} extra={<SaveIndicator salvo={salvo} />}
          />
          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            <div style={{ width: 268, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", background: T.bg.nav, flexShrink: 0 }}>
              <div style={{ padding: "16px 16px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
                <button onClick={addEntrada} style={{ width: "100%", padding: "8px 12px", background: COR_ENC + "18", border: `1px solid ${COR_ENC}44`, color: COR_ENC, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2, marginBottom: 10 }}>
                  + Nova Entrada
                </button>
                <input type="text" value={busca} onChange={e => setBusca(e.target.value)} placeholder="buscar..."
                  style={{ width: "100%", background: T.bg.input, border: `1px solid ${T.border.secondary}`, color: T.text.secondary, fontSize: 12, padding: "6px 10px", borderRadius: 2 }} />
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 10 }}>
                  {CATS.map(c => (
                    <button key={c.v} onClick={() => setCatFiltro(c.v)} style={{ padding: "2px 7px", border: `1px solid ${catFiltro === c.v ? c.cor : T.border.secondary}`, background: catFiltro === c.v ? c.cor + "18" : "transparent", color: catFiltro === c.v ? c.cor : T.text.darker, fontSize: 9, letterSpacing: 1, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>
                      {c.l}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ flex: 1, overflowY: "auto" }}>
                {filtradas.length === 0 && <EmptyMsg msg={busca ? "Nenhum resultado." : "Nenhuma entrada ainda."} />}
                {filtradas.map(e => {
                  const cat = CATS.find(c => c.v === e.categoria);
                  return (
                    <button key={e.id} onClick={() => setSel(e.id)} style={{ display: "flex", flexDirection: "column", gap: 4, width: "100%", padding: "12px 16px", background: sel === e.id ? T.bg.card : "none", border: "none", borderLeft: `2px solid ${sel === e.id ? (cat?.cor || COR_ENC) : "transparent"}`, textAlign: "left" }}>
                      <div style={{ fontSize: 13, color: sel === e.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.titulo || "—"}</div>
                      <div style={{ display: "flex", gap: 6 }}>
                        {cat && cat.v !== "todos" && <Tag texto={cat.l} cor={cat.cor} />}
                        {e.tags && e.tags.split(",").slice(0, 2).map((t, i) => <Tag key={i} texto={t.trim()} cor={T.text.darker} />)}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
            {entrada ? (
              <div style={{ flex: 1, overflowY: "auto", padding: "36px 48px 60px" }}>
                <div style={{ maxWidth: 660 }}>
                  <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
                    <span style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, fontFamily: T.font.mono }}>ENCICLOPÉDIA</span>
                    <button onClick={() => del(entrada.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: T.text.darker, fontSize: 11, letterSpacing: 1, fontFamily: T.font.mono }}>remover</button>
                  </div>
                  <TextInput label="Título" value={entrada.titulo} onChange={v => upd(entrada.id, "titulo", v)} placeholder="nome do conceito, evento ou elemento" size={20} />
                  <div style={{ marginBottom: 24 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: T.text.darker, marginBottom: 12, textTransform: "uppercase", fontFamily: T.font.mono }}>Categoria</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {CATS.filter(c => c.v !== "todos").map(c => <button key={c.v} onClick={() => upd(entrada.id, "categoria", c.v)} style={{ padding: "5px 12px", border: `1px solid ${entrada.categoria === c.v ? c.cor : T.border.secondary}`, background: entrada.categoria === c.v ? c.cor + "18" : "transparent", color: entrada.categoria === c.v ? c.cor : T.text.darker, fontSize: 10, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2 }}>{c.l}</button>)}
                    </div>
                  </div>
                  <TextArea label="Conteúdo" value={entrada.conteudo} onChange={v => upd(entrada.id, "conteudo", v)} rows={8} placeholder="definição, descrição, análise, notas..." />
                  <TextInput label="Tags (separadas por vírgula)" value={entrada.tags} onChange={v => upd(entrada.id, "tags", v)} placeholder="ex: tempo, dissociação, linguagem, corpo..." />
                  <TextArea label="Cruzamentos / referências" value={entrada.cruzamentos} onChange={v => upd(entrada.id, "cruzamentos", v)} rows={2} placeholder="outras entradas relacionadas, capítulos, personagens..." />
                  <TextArea label="Notas autorais" value={entrada.notas} onChange={v => upd(entrada.id, "notas", v)} rows={3} placeholder="reflexões, dúvidas, decisões em aberto..." />
                </div>
              </div>
            ) : (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <EmptyMsg msg={entradas.length === 0 ? "Crie a primeira entrada da enciclopédia." : "Selecione uma entrada para editar."} />
              </div>
            )}
          </div>
        </div>
      );
    }

    function exportarDados() {
      const chaves = ["estrutura", "personagens", "linha-tempo", "inconsistencias", "incons-notas", "metricas-log", "stakes", "stakes-notas", "biblia-notas"];
      const dados = {};
      chaves.forEach(k => {
        try { dados[k] = JSON.parse(localStorage.getItem(`o-entre-${k}`) || "null"); } catch {}
      });
      const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `o-entre-backup-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

                <button key={tab.id} onClick={() => setAba(tab.id)} style={{
                  flex: 1, padding: "8px 2px", background: "none", border: "none",
                  color: aba === tab.id ? T.text.primary : T.text.darker,
                  fontSize: 9, letterSpacing: 0.5, fontFamily: T.font.mono, textTransform: "uppercase",
                  borderBottom: `2px solid ${aba === tab.id ? T.accent.amber : "transparent"}`,
                  transition: "all 0.15s",
                }}>
                  {tab.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "14px 16px" }}>
            {aba === "personagens" && (
              <div>
                {pers.length === 0 && <EmptyMsg msg="Adicione personagens no módulo PER." />}
                {pers.map(p => <PersCard key={p.id} per={p} />)}
              </div>
            )}
            {aba === "axiomas" && AXIOMAS.map(ax => (
              <div key={ax.id} style={{ padding: "11px 0", borderBottom: `1px solid ${T.border.secondary}` }}>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 8, color: T.accent.amber, fontFamily: T.font.mono, width: 14, flexShrink: 0, paddingTop: 2 }}>{ax.id}</span>
                  <div>
                    <div style={{ fontSize: 11, color: T.text.secondary, marginBottom: 4, lineHeight: 1.4 }}>{ax.texto}</div>
                    <div style={{ fontSize: 10, color: T.text.dim, lineHeight: 1.5, fontStyle: "italic" }}>{ax.descricao}</div>
                  </div>
                </div>
              </div>
            ))}
            {aba === "refs" && (
              <div>
                <div style={{ fontSize: 8, color: T.text.darker, fontFamily: T.font.mono, letterSpacing: 2, marginBottom: 12, textTransform: "uppercase" }}>Mapa de urgência</div>
                {REF_DATA.urgencia.map((r, i) => (
                  <div key={i} style={{ padding: "8px 0", borderBottom: `1px solid ${T.border.secondary}` }}>
                    <div style={{ fontSize: 12, color: T.text.secondary, marginBottom: 2 }}>{r.ref}</div>
                    <div style={{ fontSize: 9, color: T.text.dim, fontFamily: T.font.mono }}>{r.funcao}</div>
                  </div>
                ))}
                <div style={{ marginTop: 20, fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, lineHeight: 1.6 }}>
                  Referências completas → modo Analisar › REF
                </div>
              </div>
            )}
            {aba === "notas" && (
              <div style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ fontSize: 8, color: T.text.darker, fontFamily: T.font.mono, letterSpacing: 2, marginBottom: 12, textTransform: "uppercase" }}>Notas rápidas</div>
                <textarea
                  value={notas}
                  onChange={e => setNotas(e.target.value)}
                  placeholder="pensamentos, conexões, questões em aberto..."
                  style={{
                    minHeight: 360, background: "transparent", border: "none",
                    color: T.text.secondary, fontSize: 13, lineHeight: 1.85,
                    resize: "none", fontFamily: T.font.serif,
                  }}
                />
              </div>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // EDITOR DE ESCRITA — MODO ESCREVER
    // ════════════════════════════════════════════════════════════════
    function EditorEscrita() {
      const [caps, setCaps] = useState(() => load("estrutura", []));
      const [selId, setSelId] = useState(() => { const s = load("estrutura", []); return s[0]?.id || null; });
      const [bibliaAberta, setBibliaAberta] = useState(false);
      const [salvo, setSalvo] = useState(false);
      const saveRef = useRef(null);

      const selCap = caps.find(c => c.id === selId);

      useEffect(() => {
        if (saveRef.current) clearTimeout(saveRef.current);
        saveRef.current = setTimeout(() => {
          save("estrutura", caps);
          setSalvo(true);
          setTimeout(() => setSalvo(false), 1500);
        }, 600);
        return () => clearTimeout(saveRef.current);
      }, [caps]);

      const addCap = () => {
        const novo = {
          id: Date.now(), numero: caps.length + 1, titulo: "",
          microestado: "dissociacao", presencaCorporal: 3, status: "rascunho",
          externo: "", interno: "", notas: "", palavras: 0, texto: "",
        };
        setCaps(prev => [...prev, novo]);
        setSelId(novo.id);
      };

      const updCap = (id, campo, val) =>
        setCaps(prev => prev.map(c => c.id === id ? { ...c, [campo]: val } : c));

      const delCap = (id) => {
        if (!window.confirm("Remover esta célula e seu texto?")) return;
        const restante = caps.filter(c => c.id !== id).map((c, i) => ({ ...c, numero: i + 1 }));
        setCaps(restante);
        setSelId(restante.length > 0 ? restante[0].id : null);
      };

      const countWords = (text) => text ? text.trim().split(/\s+/).filter(w => w.length > 0).length : 0;

      const ms = selCap ? MICROESTADOS[selCap.microestado] : null;
      const wc = selCap ? countWords(selCap.texto || "") : 0;

      return (
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          {/* Left: Chapter list */}
          <div style={{ width: 200, background: T.bg.deep, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", flexShrink: 0 }}>
            <div style={{ padding: "16px 16px 12px", borderBottom: `1px solid ${T.border.primary}` }}>
              <div style={{ fontSize: 8, letterSpacing: 3, color: T.text.darker, textTransform: "uppercase", fontFamily: T.font.mono, marginBottom: 12 }}>Células</div>
              <button onClick={addCap} style={{
                width: "100%", padding: "7px 0",
                background: T.accent.sage + "15", border: `1px solid ${T.accent.sage}33`,
                color: T.accent.sage, fontSize: 10, letterSpacing: 2, textTransform: "uppercase",
                fontFamily: T.font.mono, borderRadius: 2,
              }}>+ Nova Célula</button>
            </div>
            <div style={{ flex: 1, overflowY: "auto" }}>
              {caps.length === 0 && <EmptyMsg msg="Nenhuma célula ainda." />}
              {caps.map(c => {
                const msi = MICROESTADOS[c.microestado];
                const wci = countWords(c.texto || "");
                return (
                  <button key={c.id} onClick={() => setSelId(c.id)} style={{
                    display: "flex", alignItems: "flex-start", gap: 10, width: "100%",
                    padding: "12px 16px", background: selId === c.id ? T.bg.card : "none",
                    border: "none", borderLeft: `2px solid ${selId === c.id ? msi.cor : "transparent"}`,
                    textAlign: "left", transition: "all 0.15s",
                  }}>
                    <span style={{ fontSize: 8, color: T.text.darker, fontFamily: T.font.mono, width: 16, flexShrink: 0, paddingTop: 2 }}>
                      {String(c.numero).padStart(2, "0")}
                    </span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, color: selId === c.id ? T.text.primary : T.text.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 3 }}>
                        {c.titulo || "—"}
                      </div>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <div style={{ width: 4, height: 4, borderRadius: "50%", background: msi.cor, flexShrink: 0 }} />
                        <span style={{ fontSize: 9, color: T.text.darker, fontFamily: T.font.mono }}>
                          {wci > 0 ? `${wci} pal.` : msi.label}
                        </span>
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
            <div style={{ padding: "10px 16px", borderTop: `1px solid ${T.border.secondary}` }}>
              <SaveIndicator salvo={salvo} />
            </div>
          </div>

          {/* Center: Editor */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {selCap ? (
              <>
                {/* Header bar */}
                <div style={{
                  padding: "10px 20px", borderBottom: `1px solid ${T.border.secondary}`,
                  display: "flex", alignItems: "center", gap: 10,
                  background: T.bg.nav, flexShrink: 0, flexWrap: "wrap",
                }}>
                  <span style={{ fontSize: 9, color: T.text.darker, fontFamily: T.font.mono, letterSpacing: 2, flexShrink: 0 }}>
                    CÉLULA {String(selCap.numero).padStart(2, "0")}
                  </span>
                  <div style={{ width: 1, height: 14, background: T.border.primary }} />
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {Object.entries(MICROESTADOS).map(([k, v]) => (
                      <button key={k} onClick={() => updCap(selCap.id, "microestado", k)} style={{
                        padding: "3px 9px",
                        border: `1px solid ${selCap.microestado === k ? v.cor : T.border.secondary}`,
                        background: selCap.microestado === k ? v.cor + "20" : "transparent",
                        color: selCap.microestado === k ? v.cor : T.text.darker,
                        fontSize: 8, letterSpacing: 0.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2,
                      }}>
                        {v.label}
                      </button>
                    ))}
                  </div>
                  <div style={{ width: 1, height: 14, background: T.border.primary }} />
                  <select value={selCap.status} onChange={e => updCap(selCap.id, "status", e.target.value)} style={{
                    background: "transparent", border: `1px solid ${T.border.secondary}`,
                    color: STATUS_CAP[selCap.status]?.cor || T.text.dim,
                    fontSize: 9, letterSpacing: 1, fontFamily: T.font.mono, padding: "3px 8px",
                    textTransform: "uppercase", borderRadius: 2,
                  }}>
                    {Object.entries(STATUS_CAP).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                  <div style={{ flex: 1 }} />
                  <button onClick={() => setBibliaAberta(!bibliaAberta)} style={{
                    padding: "4px 12px",
                    background: bibliaAberta ? T.accent.amber + "15" : "transparent",
                    border: `1px solid ${bibliaAberta ? T.accent.amber + "44" : T.border.primary}`,
                    color: bibliaAberta ? T.accent.amber : T.text.dim,
                    fontSize: 9, letterSpacing: 1.5, fontFamily: T.font.mono, textTransform: "uppercase", borderRadius: 2,
                  }}>
                    Bíblia {bibliaAberta ? "●" : "○"}
                  </button>
                  <button onClick={() => delCap(selCap.id)} style={{
                    background: "none", border: "none", color: T.text.darker,
                    fontSize: 9, letterSpacing: 1, fontFamily: T.font.mono, cursor: "pointer",
                  }}>remover</button>
                </div>

                {/* Writing area */}
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <div style={{ maxWidth: 680, margin: "0 auto", padding: "52px 40px 80px" }}>
                    <input
                      type="text"
                      value={selCap.titulo}
                      onChange={e => updCap(selCap.id, "titulo", e.target.value)}
                      placeholder="título da célula"
                      style={{
                        width: "100%", background: "transparent", border: "none",
                        color: T.text.primary, fontSize: 28, fontFamily: T.font.serif,
                        letterSpacing: -0.5, padding: "0 0 16px",
                        borderBottom: `1px solid ${ms ? ms.cor + "40" : T.border.secondary}`,
                      }}
                    />
                    {ms && (
                      <div style={{ fontSize: 9, letterSpacing: 2, color: ms.cor, fontFamily: T.font.mono, textTransform: "uppercase", margin: "12px 0 40px" }}>
                        {ms.label} · {ms.descricao}
                      </div>
                    )}
                    <textarea
                      value={selCap.texto || ""}
                      onChange={e => updCap(selCap.id, "texto", e.target.value)}
                      placeholder="escreve aqui."
                      style={{
                        width: "100%", minHeight: "55vh",
                        background: "transparent", border: "none",
                        color: T.text.secondary, fontSize: 17,
                        lineHeight: 2.1, fontFamily: T.font.serif,
                        resize: "none", caretColor: T.accent.amber,
                      }}
                    />
                  </div>
                </div>

                {/* Status bar */}
                <div style={{
                  height: 34, borderTop: `1px solid ${T.border.secondary}`,
                  background: T.bg.nav, display: "flex", alignItems: "center",
                  padding: "0 24px", gap: 24, flexShrink: 0,
                }}>
                  <span style={{ fontSize: 10, color: T.text.darker, fontFamily: T.font.mono }}>
                    {wc} {wc === 1 ? "palavra" : "palavras"}
                  </span>
                  <span style={{ fontSize: 10, color: T.text.darker, fontFamily: T.font.mono }}>
                    {(selCap.texto || "").length} car.
                  </span>
                  <SaveIndicator salvo={salvo} />
                </div>
              </>
            ) : (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 13, color: T.text.darker, lineHeight: 2, fontStyle: "italic", marginBottom: 24 }}>
                    {caps.length === 0 ? "Crie a primeira célula para começar a escrever." : "Selecione uma célula."}
                  </div>
                  {caps.length === 0 && (
                    <button onClick={addCap} style={{
                      padding: "10px 24px", background: T.accent.sage + "15",
                      border: `1px solid ${T.accent.sage}33`, color: T.accent.sage,
                      fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono, borderRadius: 2,
                    }}>+ Nova Célula</button>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Right: Bíblia panel */}
          {bibliaAberta && <BibliaPainel caps={caps} />}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // APP — NAVEGAÇÃO + MODO ESCREVER / ANALISAR
    // ════════════════════════════════════════════════════════════════
    function App() {
      const [modo, setModo] = useState("escrever");
      const [ativa, setAtiva] = useState("referencias");
      const celula = CELULAS_NAV.find(c => c.id === ativa);
      const Componente = celula?.comp;
      const totalCaps = useMemo(() => load("estrutura", []).length, [ativa, modo]);

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", background: T.bg.base, color: T.text.secondary }}>
          {/* Top bar */}
          <div style={{
            height: 48, background: T.bg.deep, borderBottom: `1px solid ${T.border.primary}`,
            display: "flex", alignItems: "center", padding: "0 20px", gap: 16, flexShrink: 0,
          }}>
            <div style={{ fontSize: 15, color: T.text.primary, fontWeight: 400, letterSpacing: -0.3 }}>O Entre</div>
            <div style={{ width: 1, height: 18, background: T.border.primary }} />
            <div style={{ display: "flex", gap: 2 }}>
              {[{ id: "escrever", label: "Escrever" }, { id: "analisar", label: "Analisar" }].map(m => (
                <button key={m.id} onClick={() => setModo(m.id)} style={{
                  padding: "5px 14px",
                  background: modo === m.id ? T.accent.amber + "15" : "transparent",
                  border: `1px solid ${modo === m.id ? T.accent.amber + "40" : "transparent"}`,
                  color: modo === m.id ? T.accent.amber : T.text.dim,
                  fontSize: 10, letterSpacing: 2, textTransform: "uppercase", fontFamily: T.font.mono,
                  borderRadius: 2, transition: "all 0.15s",
                }}>
                  {m.label}
                </button>
              ))}
            </div>
            <div style={{ flex: 1 }} />
            <span style={{ fontSize: 10, color: T.text.darker, fontFamily: T.font.mono }}>
              {totalCaps} {totalCaps === 1 ? "célula" : "células"}
            </span>
            <div style={{ width: 1, height: 18, background: T.border.primary }} />
            <button onClick={exportarDados} style={{
              background: "none", border: "none", color: T.text.darker,
              fontSize: 10, letterSpacing: 1, fontFamily: T.font.mono, textTransform: "uppercase", cursor: "pointer",
            }}>exportar ↓</button>
          </div>

          {/* Content */}
          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            {modo === "escrever" ? (
              <EditorEscrita />
            ) : (
              <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
                <div style={{ width: 212, background: T.bg.deep, borderRight: `1px solid ${T.border.primary}`, display: "flex", flexDirection: "column", flexShrink: 0 }}>
                  <nav style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
                    {NAV_GRUPOS.map(grupo => {
                      const celsDo = CELULAS_NAV.filter(c => grupo.ids.includes(c.id));
                      return (
                        <div key={grupo.label}>
                          <div style={{ padding: "12px 20px 4px", fontSize: 8, letterSpacing: 3, color: T.text.darker, textTransform: "uppercase", fontFamily: T.font.mono }}>
                            {grupo.label}
                          </div>
                          {celsDo.map(c => (
                            <button key={c.id} onClick={() => setAtiva(c.id)} style={{
                              display: "flex", alignItems: "center", gap: 10, width: "100%",
                              padding: "8px 20px", background: ativa === c.id ? T.bg.card : "none",
                              border: "none", borderLeft: `2px solid ${ativa === c.id ? c.cor : "transparent"}`,
                              textAlign: "left", transition: "all 0.15s",
                            }}>
                              <span style={{ fontSize: 7, letterSpacing: 1.5, color: ativa === c.id ? c.cor : T.text.darker, fontFamily: T.font.mono, width: 22, flexShrink: 0 }}>
                                {c.sigla}
                              </span>
                              <span style={{ fontSize: 11.5, color: ativa === c.id ? T.text.primary : T.text.dim }}>
                                {c.label}
                              </span>
                            </button>
                          ))}
                        </div>
                      );
                    })}
                  </nav>
                  <div style={{ borderTop: `1px solid ${T.border.primary}`, padding: "14px 20px" }}>
                    {totalCaps > 0 && (
                      <div style={{ fontSize: 10, color: T.text.darker, fontFamily: T.font.mono, marginBottom: 10 }}>
                        {totalCaps} célula{totalCaps !== 1 ? "s" : ""} mapeada{totalCaps !== 1 ? "s" : ""}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                  {Componente && <Componente />}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // RENDER
    // ════════════════════════════════════════════════════════════════
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
